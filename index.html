<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>Cleanroom Valley — FAB-4</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
<style>
  html, body {
    margin: 0; padding: 0;
    background: #14101a;
    min-height: 100%;
    font-family: 'Press Start 2P', monospace;
    color: #f6e9c8;
    overflow: hidden;
  }
  body {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; gap: 12px;
  }
  .stage {
    width: min(96vw, calc(86vh * 1.7778));
    aspect-ratio: 16/9;
    background: #0a0810;
    box-shadow:
      0 0 0 4px #2a2236,
      0 0 0 8px #1a1422,
      0 20px 60px rgba(0,0,0,.6);
    position: relative;
    image-rendering: pixelated;
  }
  canvas {
    display: block;
    width: 100%; height: 100%;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  .hint {
    font-size: 9px;
    color: #c8a878;
    text-align: center;
    line-height: 1.6;
    max-width: min(96vw, 880px);
    padding: 0 8px;
  }
  .hint b { color: #f4d04c; }
  .toast {
    position: absolute;
    inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .toast.show .panel {
    transform: scale(1);
    opacity: 1;
  }
  .panel {
    background: #3a2818;
    border: 3px solid #f4d04c;
    box-shadow: 0 0 0 3px #1a1208, 0 8px 0 0 rgba(0,0,0,.4);
    padding: 16px 24px;
    color: #fff2c8;
    font-size: 14px;
    text-align: center;
    transform: scale(0.9);
    opacity: 0;
    transition: all 0.3s;
    image-rendering: pixelated;
  }
  .panel small {
    display: block;
    margin-top: 10px;
    font-size: 8px;
    color: #c8a878;
  }
</style>
</head>
<body>

<div class="stage" id="stage">
  <canvas id="game" width="960" height="540"></canvas>
  <div class="toast" id="toast"><div class="panel" id="toast-panel"></div></div>
</div>
<div class="hint" id="hintbar">

let TR_FRAG = TR_PAIRS.slice().sort((a,b)=>b[0].length-a[0].length);
const TR_EXACT = {}; for (const [k,v] of TR_PAIRS) if (TR_EXACT[k]===undefined) TR_EXACT[k]=v;
const TR_CACHE = new Map();
const HANGUL = /[\uAC00-\uD7A3]/;
function t(s){
  if (typeof s !== 'string' || s.length===0) return s;
  if (typeof state === 'undefined' || !state || state.lang !== 'en') return s;
  if (!HANGUL.test(s)) return s;
  const c = TR_CACHE.get(s); if (c !== undefined) return c;
  let out;
  if (TR_EXACT[s] !== undefined) out = TR_EXACT[s];
  else { out = s; for (const [ko,en] of TR_FRAG){ if (out.indexOf(ko) !== -1) out = out.split(ko).join(en); if (!HANGUL.test(out)) break; } }
  TR_CACHE.set(s, out);
  return out;
}

function txt(s, x, y, size, col, anchor){
  s = t(s);
  ctx.fillStyle = col;
  ctx.font = size + "px 'Press Start 2P', monospace";
  ctx.textAlign = anchor || 'left';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText(s, x, y);
}

// ============================================================
//  TIME OF DAY  — 1 real minute = 1 in-game hour
//  Day starts at 06:00. If not rested by 02:00 → auto collapse.
// ============================================================
// real seconds per in-game hour (smaller = faster days). 10s/hr → a full
// 06:00→02:00 day is ~3min20s. Tune this one number to change day length.
const SEC_PER_GAME_HOUR = 10;
function tickClock(){
  // pause during menus / transitions / win screen
  const officeModalOpen = state.officeShopOpen || (state.officeWork && (state.officeWork.open || state.officeWork.result));
  if (state.shopOpen || state.miniGame || state.qaGame || state.rndMenuOpen || officeModalOpen || state.fadeDir !== 0 || state.won) return;
  state.hour += 1 / (60 * SEC_PER_GAME_HOUR);   // advance, assuming ~60fps
  if (state.hour >= 26){   // 02:00 next day
    autoCollapse();
  } else if (state.hour >= 22 && !state._nightWarned){
    state._nightWarned = true;
    speak('self', '🌙 밤이 깊었어요 — R로 휴식', 150);
  }
}
function autoCollapse(){
  state.collapseCount++;
  addShake(6);
  speak('self', '😴 너무 늦었다... 다음날 아침', 150);
  rest();   // rest() resets the clock to morning and advances the day
}
function clockStr(){
  let h = Math.floor(state.hour) % 24;
  const m = Math.floor((state.hour - Math.floor(state.hour)) * 60);
  return (h<10?'0':'') + h + ':' + (m<10?'0':'') + m;
}
// roll the day's weather: winter brings snow, other seasons bring rain
function rollWeather(){
  const r = Math.random();
  if (getSeason() === 3) state.weather = r < 0.55 ? 'snow' : 'clear';
  else                   state.weather = r < 0.35 ? 'rain' : 'clear';
}
function weatherStr(){
  return state.weather === 'rain' ? '🌧 비' : state.weather === 'snow' ? '❄ 눈' : '☀ 맑음';
}
// Day/night ambient tint keyframes (hour → rgb + alpha overlay)
const TINT_KEYS = [
  { h:6,  c:[60,72,116],  a:0.22 },  // dawn (cool, gentle)
  { h:8,  c:[90,100,140], a:0.08 },  // early morning
  { h:11, c:[255,250,230],a:0.00 },  // late morning (clear)
  { h:15, c:[255,244,214],a:0.00 },  // afternoon (clear)
  { h:17, c:[244,176,96], a:0.10 },  // golden hour
  { h:19, c:[214,120,84], a:0.18 },  // sunset
  { h:21, c:[100,84,140], a:0.26 },  // dusk
  { h:23, c:[44,52,96],   a:0.32 },  // night
  { h:26, c:[30,38,74],   a:0.36 },  // deep night (capped — desk lamp lights work area)
];
function dayNightTint(){
  const h = state.hour;
  const k = TINT_KEYS;
  if (h <= k[0].h) return { c:k[0].c, a:k[0].a };
  if (h >= k[k.length-1].h) return { c:k[k.length-1].c, a:k[k.length-1].a };
  for (let i=0;i<k.length-1;i++){
    if (h >= k[i].h && h <= k[i+1].h){
      const t = (h - k[i].h)/(k[i+1].h - k[i].h);
      const c = [0,1,2].map(j => Math.round(k[i].c[j] + (k[i+1].c[j]-k[i].c[j])*t));
      return { c, a: k[i].a + (k[i+1].a - k[i].a)*t };
    }
  }
  return { c:k[0].c, a:k[0].a };
}
function drawDayNightTint(){
  const t = dayNightTint();
  if (t.a > 0.01){
    ctx.fillStyle = 'rgba('+t.c[0]+','+t.c[1]+','+t.c[2]+','+t.a.toFixed(3)+')';
    ctx.fillRect(0,0,W,H);
  }
}
// desk lamp turns on once the ambient tint starts to darken
function lampOn(){ return dayNightTint().a > 0.06; }
// warm pool of light over the desk, drawn AFTER the tint so it cuts through
function drawDeskLight(){
  if (!lampOn()) return;
  const intensity = Math.min(1, dayNightTint().a / 0.32);
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const g = ctx.createRadialGradient(238, 116, 4, 238, 132, 96);
  g.addColorStop(0,   'rgba(255,226,150,' + (0.55*intensity) + ')');
  g.addColorStop(0.45,'rgba(252,206,128,' + (0.26*intensity) + ')');
  g.addColorStop(1,   'rgba(250,196,120,0)');
  ctx.fillStyle = g;
  ctx.fillRect(150, 88, 180, 120);
  ctx.restore();
}
// clock text color shifts with the time of day
function clockColor(){
  const h = state.hour % 24;
  if (h < 7) return '#8aa0d8';      // night/dawn blue
  if (h < 11) return C.parchment;   // morning
  if (h < 17) return '#fff8e0';     // bright day
  if (h < 20) return '#f0a850';     // evening orange
  return '#8aa0d8';                 // night blue
}

  let tot=0; for (const m of MINERALS) tot+=m.w;
  let r=Math.random()*tot;
  for (const m of MINERALS){ r-=m.w; if (r<=0) return m.id; }
  return 'quartz';
}
function discoverMineral(id, n){
  n = n || 1;
  const had = state.collection.minerals[id] || 0;
  state.collection.minerals[id] = had + n;
  if (had === 0){
    const m = MINERALS.find(x=>x.id===id);

    unlock('MIN_'+id, '📖 광물 수집: ' + (m?m.name:id), 0);
  }
}
function discoverDefect(id){

const keys = {};
// IME-robust key name: derive from the physical key (e.code) so letter keys
// still work while a Korean (한글) input mode is active.
function normKey(e){
  const c = e.code || '';
  if (/^Key[A-Z]$/.test(c)) return c.slice(3).toLowerCase();   // KeyL -> 'l'
  if (/^Digit[0-9]$/.test(c)) return c.slice(5);               // Digit1 -> '1'
  if (c === 'Space') return ' ';
  if (c === 'Escape') return 'escape';
  if (c === 'Enter' || c === 'NumpadEnter') return 'enter';
  if (/^Arrow/.test(c)) return c.toLowerCase();                // ArrowUp -> 'arrowup'
  return (e.key || '').toLowerCase();
}
window.addEventListener('keydown', e => {
  const k = normKey(e);
  keys[k] = true;
  if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k)) e.preventDefault();

  // Language menu owns all input while open
  if (state.langMenu){ handleLangMenuKey(k); return; }
  // Open the language menu any time
  if (k === 'g'){ openLangMenu(); return; }

  // Lock all input during a scene fade
  if (state.fadeDir !== 0) return;

  // Automation dashboard (P) — owns input while open; opens above the world
  if (state.dashOpen){
    if (k === 'p' || k === 'escape' || k === 'q') state.dashOpen = false;
    else if (k === 'u') autoUnlock();
    else if (k === 'o') autoToggle();
    else if (k === 'm') autoPurge();
    else if (k === 'arrowup' || k === 'w') state.auto.sel = (state.auto.sel + 2) % 3;
    else if (k === 'arrowdown' || k === 's') state.auto.sel = (state.auto.sel + 1) % 3;
    else if (k === 'enter' || k === ' ' || k === 'b' || k === 'h') autoBuyLine(state.auto.sel);
    return;
  }
  if (k === 'p'){
    if (state.ending || state.questLogOpen || state.compendiumOpen || state.npcDialog ||
        state.shopOpen || state.officeShopOpen || state.rndMenuOpen || state.miniGame || state.qaGame || state.contracts.open || state.tech.open) return;
    state.dashOpen = true; return;
  }
  // Contracts board (C) — owns input while open; opens above the world
  if (state.contracts.open){
    if (k === 'c' || k === 'escape' || k === 'q') state.contracts.open = false;
    else if (k === 'arrowup' || k === 'w'){ const n = state.contracts.available.length; if (n) state.contracts.sel = (state.contracts.sel + n - 1) % n; }
    else if (k === 'arrowdown' || k === 's'){ const n = state.contracts.available.length; if (n) state.contracts.sel = (state.contracts.sel + 1) % n; }
    else if (k === 'enter' || k === ' ') acceptContract(state.contracts.sel);
    return;
  }
  if (k === 'c'){
    if (state.ending || state.questLogOpen || state.compendiumOpen || state.npcDialog ||
        state.shopOpen || state.officeShopOpen || state.rndMenuOpen || state.miniGame || state.qaGame || state.dashOpen || state.tech.open) return;
    state.contracts.open = true; return;
  }
  // Tech tree (T) — owns input while open; opens above the world
  if (state.tech.open){
    if (k === 't' || k === 'escape' || k === 'q') state.tech.open = false;
    else if (k === 'arrowup' || k === 'w') state.tech.sel = (state.tech.sel + TECHS.length - 1) % TECHS.length;
    else if (k === 'arrowdown' || k === 's') state.tech.sel = (state.tech.sel + 1) % TECHS.length;
    else if (k === 'enter' || k === ' ') techBuy(state.tech.sel);
    return;
  }
  if (k === 't'){
    if (state.ending || state.questLogOpen || state.compendiumOpen || state.npcDialog ||
        state.shopOpen || state.officeShopOpen || state.rndMenuOpen || state.miniGame || state.qaGame || state.dashOpen || state.contracts.open) return;
    state.tech.open = true; return;
  }

  // Ending screen owns input — any of these resumes endless play
  if (state.ending){
    if (k === ' ' || k === 'enter' || k === 'r') closeEnding();
    return;
  }

  // Quest log overlay — openable from any scene
  if (state.questLogOpen){
    if (k === 'l' || k === 'escape' || k === 'q' || k === 'j') state.questLogOpen = false;
    return;
  }
  if (k === 'l' || k === 'j'){ state.questLogOpen = true; return; }

  // Compendium (도감) overlay — openable from any scene with K
  if (state.compendiumOpen){
    if (k === 'k' || k === 'escape' || k === 'q') state.compendiumOpen = false;
    else if (k === 'arrowleft' || k === 'a' || k === 'arrowright' || k === 'd') state.compendiumTab = state.compendiumTab ? 0 : 1;
    return;
  }
  if (k === 'k'){ state.compendiumOpen = true; state.compendiumTab = 0; return; }

  // NPC dialogue box — closes on confirm, openable from any scene
  if (state.npcDialog){
    if (k === ' ' || k === 'e' || k === 'enter' || k === 'escape') state.npcDialog = null;
    return;
  }

  // Office scene has its own input handling
  if (state.scene === 'office'){
    handleOfficeKey(k);
    return;
  }
  // Smock (gowning) room input
  if (state.scene === 'smock'){
    handleSmockKey(k);
    return;
  }
  // Break room input
  if (state.scene === 'break'){
    handleBreakKey(k);
    return;
  }
  // R&D lab input
  if (state.scene === 'rnd'){
    handleRndKey(k);
    return;
  }
  // Rooftop garden input
  if (state.scene === 'roof'){
    handleRoofKey(k);
    return;
  }
  // Hallway input
  if (state.scene === 'hall'){ handleHallKey(k); return; }
  // Lobby input
  if (state.scene === 'lobby'){ handleLobbyKey(k); return; }
  // Front garden input
  if (state.scene === 'garden'){ handleGardenKey(k); return; }
  // Silicon mine input
  if (state.scene === 'mine'){ handleMineKey(k); return; }
  // Library input
  if (state.scene === 'library'){ handleLibraryKey(k); return; }

  // Shop modal swallows most input
  if (state.shopOpen){
    if (k === 'b' || k === 'escape') closeShop();
    else if (k === 'arrowup' || k === 'w') shopMove(-1);
    else if (k === 'arrowdown' || k === 's') shopMove(1);
    else if (k === 'enter' || k === ' ') shopBuy();
    return;
  }

  // QA inspection swallows keyboard (mouse-driven); Esc aborts
  if (state.qaGame){
    if (k === 'escape' && !state.qaGame.result) qaResolve();
    return;
  }

  // Minigame swallows Space/E
  if (state.miniGame && !state.miniGame.result){
    if (k === ' ' || k === 'e') resolveMiniGame();
    return;
  }

  // Normal world input
  if (k === ' ' || k === 'e') tryInteract();
  if (k === 'r') rest();
  if (k === 'b') openShop();
  if (k === 'q') discardCarry();
  if (k >= '1' && k <= '8') clickInventory(parseInt(k, 10));
});

// Mouse — used by the QA defect-hunter (maps screen px → logical 480x270 coords)
function cvsToLogical(e){
  const r = cvs.getBoundingClientRect();
  return {
    x: (e.clientX - r.left) / r.width  * W,
    y: (e.clientY - r.top)  / r.height * H,
  };
}
cvs.addEventListener('mousedown', e => {
  const p = cvsToLogical(e);
  if (state.langMenu){ langMenuClick(p.x, p.y); return; }
  if (!state.qaGame || state.qaGame.result) return;
  qaClick(p.x, p.y);
});
cvs.addEventListener('mousemove', e => {
  if (!state.qaGame) return;
  const p = cvsToLogical(e);
  state.qaMouse.x = p.x; state.qaMouse.y = p.y;
});

function tickFade(){
  if (state.fadeDir === 0) return;
  state.fade += state.fadeDir * 0.1;
  if (state.fade >= 1){
    state.fade = 1;
    if (state.pendingScene){ doSceneSwitch(state.pendingScene); state.pendingScene = null; }
    state.fadeDir = -1;
  } else if (state.fade <= 0){
    state.fade = 0;
    state.fadeDir = 0;
  }
}

// pick nearest station within range of player feet
function nearestStation(){
  let best = null, bd = 999;
  for (const s of STATIONS){
    const dx = state.px - s.doorX, dy = state.py - s.doorY;
    const d = Math.hypot(dx, dy);
    if (d < 20 && d < bd){ bd = d; best = s; }
  }
  return best;
}

function tryInteract(){
  if (state.won) return;
  if (state.miniGame) return;
  if (state.shopOpen) return;
  if (state.qaGame) return;
  const s = nearestStation();
  if (!s) return;

  if (s.id === 'foup'){
    if (state.carry){ showMsg('이미 들고 있음 — Q로 버리기'); return; }
    state.carry = 'raw';
    state.carryQ = 0;
    state.carryQA = null;
    speak('self', 'Raw wafer 획득!', 90);
  }
  else if (s.id === 'exit'){
    switchScene('smock');
  }
  else if (s.id === 'qa'){
    startQA();
  }
  else if (s.id === 'shop'){
    openShop();
  }
  else if (s.id === 'litho'){
    if (state.lithoBusy > 0){ showMsg('가동 중...'); return; }
    if (state.lithoOut){
      if (state.carry){ showMsg('손 비워야 함 — Q로 버리기'); return; }
      state.carry = 'exposed';
      state.carryQ = state.lithoOutQ;
      state.lithoOut = false;
      const tag = state.carryQ === 2 ? 'PERFECT exposed!' : state.carryQ === 1 ? 'Good exposed!' : 'Exposed';
      speak('self', tag, 90);
      return;
    }
    if (state.carry !== 'raw'){ showMsg('Raw wafer 필요'); return; }
    if (state.power < 8){ showMsg('Power 부족! R로 휴식'); return; }
    if (state.inventory.photoresist <= 0){ showMsg('Photoresist 부족! Shop에서 구매'); return; }
    startMiniGame('litho');
  }
  else if (s.id === 'etcher'){
    if (state.etchBusy > 0){ showMsg('가동 중...'); return; }
    if (state.etchOut){
      if (state.carry){ showMsg('손 비워야 함 — Q로 버리기'); return; }
      state.carry = 'etched';
      state.carryQ = state.etchOutQ;
      state.etchOut = false;
      const tag = state.carryQ === 2 ? 'PERFECT etched!' : state.carryQ === 1 ? 'Good etched!' : 'Etched';
      speak('self', tag, 90);
      return;
    }
    if (state.carry !== 'exposed'){ showMsg('Exposed wafer 필요'); return; }
    if (state.power < 10){ showMsg('Power 부족! R로 휴식'); return; }
    if (state.inventory.etchant <= 0){ showMsg('Etchant 부족! Shop에서 구매'); return; }
    startMiniGame('etcher');
  }
  else if (s.id === 'crate'){
    if (state.carry !== 'etched'){ showMsg('완성품(etched) 필요'); return; }
    const reward = computeShipReward(state.carryQ);
    gainSi(reward);
    onShipped(state.carryQ);
    deliverToContracts(state.carryQ);   // route this wafer to a matching contract (Phase 3)
    state.contam = Math.min(100, state.contam + CONTAM.manual);   // hand work fouls the room a little (Phase 5)
    const gradeTag = state.carryQA === 'A' ? ' [A]' : state.carryQA === 'B' ? ' [B]' : '';
    const big = reward >= 35 || state.carryQ === 2;
    spawnFloater(448, 198, '+' + reward + ' Si' + gradeTag, big ? '#fff2bc' : C.badge, { size: big ? 9 : 7, life: 56 });
    spawnBurst(448, 204, [C.badge, '#fff2bc', C.grnHi, '#ffffff'], big ? 16 : 8, { spd: big ? 1.8 : 1.2, up: 0.5 });
    addShake(big ? 3.2 : 1);
    state.carry = null;
    state.carryQ = 0;
    state.carryQA = null;
    speak('self', '출하 완료!', 90);
    state.temp += (Math.random()-0.5) * 0.6;
    state.temp = Math.max(20, Math.min(25, state.temp));
  }
  else if (s.id === 'npc'){
    talkNpc();
  }
}

function discardCarry(){
  if (state.miniGame || state.shopOpen || state.won || state.qaGame) return;
  if (!state.carry){ showMsg('버릴 게 없음'); return; }
  const c = state.carry;
  const q = state.carryQ;
  state.carry = null;
  state.carryQ = 0;
  state.carryQA = null;
  if (c === 'raw'){
    speak('self', 'Raw wafer 버림', 80);
  } else if (c === 'exposed'){
    const qName = ['Normal','Good','PERFECT'][q];
    speak('self', 'Exposed(' + qName + ') 버림 😢', 110);
    state.scrapTotal++;
  } else if (c === 'etched'){
    const qName = ['Normal','Good','PERFECT'][q];
    speak('self', 'Etched(' + qName + ') 버림 😭', 130);
    state.scrapTotal++;
  }
}

function rest(){
  // Resting always advances the day (and eventually the season),
  // even when power/supplies are already full — like sleeping in Stardew.
  state.roofSitting = false;
  state.power = state.maxPower;
  state.oreVein = 100;
  const prevSeason = getSeason();
  state.day += 1;
  state.hour = 6;            // wake up at 06:00
  state._nightWarned = false;
  rollWeather();
  if (state.weather !== 'clear'){
    setTimeout(()=>{ showMsg((state.weather==='rain'?'🌧 오늘은 비가 내립니다':'❄ 오늘은 눈이 내립니다'), 220); }, 400);
  }
  state.temp = 22.0 + Math.random() * 0.4;
  // new day resets office availability and clears the daily buff
  state.officeDoneToday = false;
  state.officeBuff = null;
  state.officeWork = null;   // abandon any in-progress/paused document session
  tickContractsDaily();      // expire overdue contracts, refresh the order board (Phase 3)
  if (state.contam > 0) state.contam = Math.max(0, state.contam - CONTAM.restClean);   // overnight cleaning (Phase 5)
  state._contamWarn = false;
  // refill basic consumables up to 5
  if (state.inventory.photoresist < 5) state.inventory.photoresist = 5;
  if (state.inventory.etchant < 5) state.inventory.etchant = 5;
  // furniture daily perks
  if (state.furniture.coffeeMachine){ state.inventory.coffee += 1; }
  if (state.furniture.aquarium){ gainSi(20); }
  // R&D: advance active research; complete and apply when days run out
  if (state.research.active){
    state.research.active.daysLeft--;
    if (state.research.active.daysLeft <= 0){
      const id = state.research.active.id;
      state.research.done[id] = true;
      state.research.active = null;
      const p = RND_PROJECTS.find(x=>x.id===id);
      unlock('RND_'+id, '🔬 연구 완료: ' + (p?p.name:id), 0);
      questEvent('research');
      setTimeout(()=>{ toast('🔬 R&D 연구 완료!<br>' + (p?p.name:'') + '<br><small>' + (p?p.desc:'') + '</small>', 3000); }, 200);
    }
  }
  // clear the GIGAFAB win banner if it's up, but keep all progress (it's an endless title)
  if (state.won){
    state.won = false;
    document.getElementById('toast').classList.remove('show');
  }
  if (state.day === 3) unlock('DAY_3', '☀️ Day 3 도달!', 15);
  if (state.day === 7) unlock('DAY_7', '☀️ Day 7 도달!', 30);
  // 1년차 결산 — Day 28에 도달하면 (기가팹보다 먼저면) 엔딩
  if (state.day >= 28) triggerEnding('year1');
  const newSeason = getSeason();
  let extra = '';
  if (state.furniture.coffeeMachine) extra += ' ☕+1';
  if (state.furniture.aquarium) extra += ' 🐠+20Si';
  if (newSeason !== prevSeason){
    speak('self', SEASON_KR[newSeason] + ' 시즌 시작!' + extra, 140);
  } else {
    speak('self', 'Day ' + state.day + ' — 보급 완료!' + extra, 110);
  }
}

function openShop(){
  if (state.miniGame) return;
  state.shopOpen = true;
  state.shopCursor = 0;
}
function closeShop(){
  state.shopOpen = false;
  state.shopFlash = 0;
}
function shopMove(dir){
  let n = state.shopCursor + dir;
  if (n < 0) n = SHOP_ITEMS.length - 1;
  if (n >= SHOP_ITEMS.length) n = 0;
  state.shopCursor = n;
}
function shopBuy(){
  const item = SHOP_ITEMS[state.shopCursor];
  if (item.kind === 'consume'){
    if (state.silicon < item.price){ speak('self','Si 부족!', 70); return; }
    state.silicon -= item.price;
    if (item.id === 'pr')      state.inventory.photoresist += 5;
    else if (item.id === 'et') state.inventory.etchant += 5;
    else if (item.id === 'coffee') state.inventory.coffee += 1;
    else if (item.id === 'wrench') state.inventory.wrench += 1;
    else if (item.id === 'mask')   state.inventory.mask += 1;
    state.shopFlash = 24;
    speak('self', '구매 ✓', 60);
    unlock('FIRST_BUY', '🛒 첫 구매!', 0);
  } else {
    const lv = state.upgrades[item.id];
    if (lv >= item.max){ speak('self','MAX 도달!', 70); return; }
    const price = item.prices[lv];
    if (state.silicon < price){ speak('self','Si 부족!', 70); return; }
    state.silicon -= price;
    state.upgrades[item.id]++;
    applyUpgrade(item.id);
    state.shopFlash = 36;
    speak('self', item.name + ' Lv.' + (lv+1) + ' !', 120);
    unlock('FIRST_UPGRADE', '⚡ 첫 업그레이드!', 0);
    if (state.upgrades.battery === 3) unlock('MAX_BATTERY', '🔋 Battery MAX!', 50);
    if (state.upgrades.lithoBoost === 3 && state.upgrades.etchBoost === 3)
      unlock('MAX_SPEED', '⚡ 풀스피드!', 80);
  }
}
function applyUpgrade(id){
  if (id === 'battery'){
    state.maxPower = 100 + 20 * state.upgrades.battery;
    state.power = state.maxPower;
  }
}

function useInventoryItem(slot){
  if (state.miniGame || state.shopOpen || state.won) return;
  if (slot === 4){
    if (state.inventory.coffee <= 0){ showMsg('☕ Coffee 없음 — Shop에서 구매'); return; }
    state.inventory.coffee--;
    state.power = Math.min(state.maxPower, state.power + 40);
    speak('self', '☕ +40 Power', 80);
  } else if (slot === 5){
    if (state.inventory.wrench <= 0){ showMsg('🔧 Wrench 없음 — Shop에서 구매'); return; }
    if (state.lithoBusy === 0 && state.etchBusy === 0){
      showMsg('가동 중인 장비 없음'); return;
    }
    state.inventory.wrench--;
    if (state.lithoBusy > 0) state.lithoBusy = 1;
    if (state.etchBusy > 0) state.etchBusy = 1;
    speak('self', '🔧 즉시 완료!', 80);
  } else if (slot === 6){
    if (state.inventory.mask <= 0){ showMsg('🎭 Mask 없음 — Shop에서 구매'); return; }
    if (state.boostNext.perfect){ showMsg('이미 활성 중'); return; }
    state.inventory.mask--;
    state.boostNext.perfect = true;
    speak('self', '🎭 다음 캘리브 PERFECT 보장!', 110);
  }
}

// All slot clicks (number keys 1-8) — slots 1-3 show info, 4-6 use items, 7-8 are empty
function clickInventory(slot){
  if (state.shopOpen || state.won) return;
  if (state.miniGame && !state.miniGame.result) return;
  // visual flash always fires (gives clear keypress feedback)
  state.invFlash = { slot: slot - 1, until: state.t + 14 };

  if (slot === 1){
    if (!state.carry){ showMsg('웨이퍼 없음 — FOUP에서 꺼내기'); return; }
    const qName = ['Normal','Good','PERFECT'][state.carryQ];
    const cName = state.carry === 'raw' ? 'Raw'
                : state.carry === 'exposed' ? 'Exposed'
                : 'Etched';
    showMsg('현재: ' + cName + ' wafer  [Q: ' + qName + ']');
  } else if (slot === 2){
    showMsg('Photoresist × ' + state.inventory.photoresist + '  — Litho 자동 소모');
  } else if (slot === 3){
    showMsg('Etchant × ' + state.inventory.etchant + '  — Etch 자동 소모');
  } else if (slot === 4 || slot === 5 || slot === 6){
    useInventoryItem(slot);
  } else if (slot === 7 || slot === 8){
    showMsg('빈 슬롯 — 차후 해금 예정');
  }
}

function startMiniGame(type){
  const sp = 0.016 * (state.research.done.autoAlign ? 0.7 : 1);   // R&D: AI auto-align
  state.miniGame = { type, pos: 0, dir: 1, speed: sp, result: null, lockedAt: 0 };
}

function resolveMiniGame(){
  const m = state.miniGame;
  if (!m || m.result) return;

  // Mask boost: force perfect result regardless of timing
  let result;
  if (state.boostNext.perfect){
    result = 'perfect';
    state.boostNext.perfect = false;
  } else {
    const p = m.pos;
    // Wider PERFECT zone if upgraded (+2.5% half-width per level) + R&D yield mastery
    const pad = 0.025 * state.upgrades.perfect + (state.research.done.yieldUp ? 0.04 : 0);
    if (p > 0.45 - pad && p < 0.55 + pad) result = 'perfect';
    else if (p > 0.28 && p < 0.72) result = 'good';
    else result = 'bad';
  }
  m.result = result;
  m.lockedAt = state.t;

  const isLitho = m.type === 'litho';
  const ecoMult = state.research.done.eco ? 0.7 : 1;   // R&D: green process
  if (result === 'bad'){
    // scrap the wafer
    state.carry = null;
    state.carryQ = 0;
    state.scrapTotal++;
    state.power = Math.max(0, state.power - 4);
    speak('self', 'SCRAP! 캘리브레이션 실패', 110);
    state.combo = 0;
    state.comboTimer = 0;
  } else {
    // consume the fuel and run the machine
    const inQ = state.carryQ;
    const outQ = result === 'perfect' ? Math.min(2, inQ + 1) : inQ;
    if (result === 'perfect'){
      questEvent('perfect');
      spawnFloater(state.px, state.py-28, 'PERFECT!', '#fff2bc', { size: 8, life: 56 });
      spawnBurst(state.px, state.py-18, ['#fff2bc', C.badge, C.grnHi, '#ffffff'], 16, { spd: 1.8, up: 0.6 });
      addShake(1.6);
    } else if (result === 'good'){
      spawnFloater(state.px, state.py-26, 'Good', C.grnHi, { size: 6, life: 42 });
    }
    state.carry = null;
    if (isLitho){
      state.inventory.photoresist = Math.max(0, state.inventory.photoresist - 1);
      const baseBusy = 180 - 30 * state.upgrades.lithoBoost;
      state.lithoBusy = Math.max(30, baseBusy);
      state.lithoOutQ = outQ;
      state.power = Math.max(0, state.power - Math.round(8 * ecoMult));
    } else {
      state.inventory.etchant = Math.max(0, state.inventory.etchant - 1);
      const baseBusy = 180 - 30 * state.upgrades.etchBoost;
      state.etchBusy = Math.max(30, baseBusy);
      state.etchOutQ = outQ;
      state.power = Math.max(0, state.power - Math.round(10 * ecoMult));
    }
  }
}

function tickMiniGame(){
  const m = state.miniGame;
  if (!m) return;
  if (m.result){
    if (state.t - m.lockedAt > 40) state.miniGame = null;
    return;
  }
  // ramp up speed slowly for skill
  m.pos += m.dir * m.speed;
  if (m.pos >= 1){ m.pos = 1; m.dir = -1; }
  if (m.pos <= 0){ m.pos = 0; m.dir = 1; }
}

// ============================================================
//  QA INSPECTION  — defect-hunter (find & click defects under the scope)
// ============================================================
const QA_CX = 240, QA_CY = 130, QA_R = 76;   // microscope lens center + radius
const QA_DEFECTS = 5;
const QA_TIME = 9 * 60;                        // 9 seconds @ ~60fps

function startQA(){
  if (state.carry !== 'etched'){ showMsg('QA: 완성품(etched)만 검사 가능'); return; }
  if (state.carryQA){ showMsg('이미 검사 완료된 웨이퍼'); return; }
  const defects = [];
  let tries = 0;
  while (defects.length < QA_DEFECTS && tries < 200){
    tries++;
    const ang = Math.random() * Math.PI * 2;
    const rad = Math.sqrt(Math.random()) * (QA_R - 12);
    const x = QA_CX + Math.cos(ang) * rad;
    const y = QA_CY + Math.sin(ang) * rad;
    // keep them apart so clicks aren't ambiguous
    if (defects.some(d => Math.hypot(d.x-x, d.y-y) < 18)) continue;
    defects.push({ x, y, r: 3 + Math.random()*2, found:false, ph: Math.random()*6.28, type: DEFECTS[(Math.random()*DEFECTS.length)|0].id });
  }
  state.qaGame = { defects, found:0, total:defects.length, timeLeft:QA_TIME, result:null, lockedAt:0, ripple:null };
}

function qaClick(lx, ly){
  const g = state.qaGame;
  if (!g || g.result) return;
  g.ripple = { x:lx, y:ly, t:state.t, hit:false };
  // only register inside the lens
  if (Math.hypot(lx-QA_CX, ly-QA_CY) > QA_R) return;
  for (const d of g.defects){
    if (d.found) continue;
    if (Math.hypot(lx-d.x, ly-d.y) < d.r + 7){
      d.found = true;
      g.found++;
      g.ripple.hit = true;
      discoverDefect(d.type);
      if (g.found >= g.total) qaResolve();
      return;
    }
  }
}

function qaResolve(){
  const g = state.qaGame;
  if (!g || g.result) return;
  const ratio = g.found / g.total;
  let grade = null, label;
  if (ratio >= 0.999){ grade = 'A'; label = '⭐ Grade A — 무결점! 단가 +50%'; }
  else if (ratio >= 0.6){ grade = 'B'; label = 'Grade B — 단가 +20%'; }
  else { grade = null; label = '미인증 — 결함 다수 (보너스 없음)'; }
  state.carryQA = grade;
  g.result = { grade, label, found: g.found, total: g.total };
  g.lockedAt = state.t;
  if (grade === 'A') unlock('QA_PERFECT', '🔬 QA 무결점 검사!', 0);
  if (!state.achv.QA_FIRST) unlock('QA_FIRST', '🔬 첫 QA 검사!', 0);
}

function tickQA(){
  const g = state.qaGame;
  if (!g) return;
  if (g.result){
    if (state.t - g.lockedAt > 110) state.qaGame = null;   // auto-close after showing result
    return;
  }
  g.timeLeft--;
  if (g.timeLeft <= 0) qaResolve();
}

function initNpcQuests(){
  state.npcQuests = NPC_QUESTS.map(q => ({
    id:q.id, loc:q.loc, npc:q.npc, role:q.role, emoji:q.emoji, type:q.type, kind:q.kind,
    tiers:q.tiers, tier:0, progress:0, status:'active'   // active | ready | done
  }));
}
// advance any matching active NPC quest
function questEvent(type, n=1){
  if (!state.npcQuests) return;
  for (const q of state.npcQuests){
    if (q.status==='active' && q.type===type){
      q.progress += n;
      if (q.progress >= q.tiers[q.tier].target){
        q.progress = q.tiers[q.tier].target;
        q.status = 'ready';
        const nm = q.npc;
        setTimeout(()=>{ toast('✅ 퀘스트 완료!<br>' + nm + '에게 보고하세요 (' + q.loc.toUpperCase() + ')<br><small>L: 퀘스트 창</small>', 2600); }, 150);
      }
    }
  }
}
// the NPC for the current scene (if any)
function sceneNpcQuest(){
  if (!state.npcQuests) return null;
  return state.npcQuests.find(q => q.loc === state.scene) || null;
}
function claimNpcQuest(q){
  const tier = q.tiers[q.tier];
  if (q.kind==='si') gainSi(tier.reward); else state.krw += tier.reward;
  state.npcQuestsClaimed++;
  spawnFloater(240, 96, '+' + tier.reward + ' ' + (q.kind==='si'?'Si':'₩'), C.badge, { size: 9, life: 56 });
  spawnBurst(240, 100, [C.badge, '#fff2bc', C.grnHi, '#ffffff'], 18, { spd: 1.9, up: 0.6 });
  addShake(2.4);
  unlock('NPCQ_'+q.id+'_'+q.tier, '🤝 ' + q.npc + ': ' + tier.title, 0);
  // advance to next tier or finish
  if (q.tier < q.tiers.length-1){ q.tier++; q.status='active'; }
  else q.status='done';
  toast('🤝 ' + q.npc + '에게 보고 완료!<br>+' + tier.reward + ' ' + (q.kind==='si'?'Si':'₩'), 2200);
}

  state.npcDialog = { name, role, color, text };
}

  if (!q){ openNpcDialog('동료', '', '#7a7a8a', '오늘도 좋은 수율 내봐요!'); return; }

    openNpcDialog(q.npc, q.role, col, '의뢰는 다 끝났어요. 늘 고마워요 😊');

const NPC_COLORS = { fab:'#3a6ea5', office:'#b0584e', smock:'#4a8a5a', break:'#b0822e', rnd:'#5a4a9a', roof:'#c05a8a' };
function drawNpcMarker(cx, topY, q){
  // floating quest marker above an NPC's head
  if (q.status === 'done'){ R(cx-1,topY+2,2,2,'#e0a0b0'); return; }
  const ready = q.status === 'ready';
  const col = ready ? C.grnHi : C.badge;
  const bob = ready ? ((state.t>>3)&1 ? -1 : 0) : 0;
  const y = topY + bob;
  // speech-bubble backing
  R(cx-4,y-3,8,8, ready ? '#1a3a24' : '#3a2e10');
  R(cx-4,y-3,8,1, col);
  // exclamation mark
  R(cx-1,y-1,2,4, col);
  R(cx-1,y+4,2,2, col);
}

  const sh = NPC_COLORS[q.id] || '#666';

function drawAutoPipe(mx, topY, mw){

  const contentW = 3*bw + 2*gap + 16 + siW;

  const running = a.unlocked && a.on && !a.stalled && autoThroughput() > 0;
  const flow = running ? autoThroughput() : 0;
  function box(i){
    const s = AUTO.stages[i];
    const bott = a.unlocked && a.on && a.bottleneck === i;
    const dim = a.unlocked && a.on && !bott;
    R(x, topY, bw, bh, '#2a2436');

  function buffer(bi){
    const bx = x + 3, gw = 7, gh = bh-8;
    const lvl = Math.max(0, Math.min(1, a.buf[bi] / AUTO.buffMax));
    R(bx, topY+4, gw, gh, '#1d1a28');

    x += gap;

  x += 6; R(x, cy, 10, 1, '#8a7e64');
  if (flow > 0){ const ph=(state.t*(0.4+flow*0.05))%14; R(x+(ph%10|0), cy-1, 2, 2, '#cfe0a0'); }
  x += 14;
  const pulse = (state.t - a.lastShipT) < 16 && running;
  R(x, cy-7, siW, 16, '#2e6a48'); R(x+1, cy-6, siW-2, 14, pulse ? '#46b074' : '#3a8c5c');
  txt('Si', x+siW/2, cy+3, 6, pulse ? '#fff2c8' : '#d4ecdc', 'center');
}

function drawWrapped(text, x, y, maxW, size, color, lineH){
  text = t(text);
  const charW = size * 1.18;
  const perLine = Math.max(6, Math.floor(maxW / charW));
  let ly = y;
  for (const para of String(text).split('\n')){
    if (para.length === 0){ ly += lineH; continue; }
    if (para.indexOf(' ') !== -1){
      // word-aware wrapping (better for English)
      let line = '';
      for (const word of para.split(' ')){
        const test = line ? line + ' ' + word : word;
        if (test.length > perLine && line){
          txt(line, x, ly, size, color, 'start'); ly += lineH; line = word;
        } else line = test;
      }
      if (line){ txt(line, x, ly, size, color, 'start'); ly += lineH; }
    } else {
      for (let i=0;i<para.length;i+=perLine){
        txt(para.slice(i, i+perLine), x, ly, size, color, 'start');
        ly += lineH;
      }
    }
  }
}

// ============================================================
//  COMBO & SHIP REWARDS
// ============================================================

function comboMult(){
  if (state.combo >= 5) return 3;
  if (state.combo >= 3) return 2;
  if (state.combo >= 2) return 1.5;
  return 1;
}

function qualityMult(q){
  return [1, 2, 4][q];
}

function computeShipReward(q){
  let base = fabInfo().base;
  if (state.research.done.nextNode) base += 4;   // R&D: next-gen node
  const rushMult = state.rush ? 2 : 1;
  const officeMult = (state.officeBuff && state.officeBuff.shipMult) ? state.officeBuff.shipMult : 1;
  const qaMult = state.carryQA === 'A' ? 1.5 : state.carryQA === 'B' ? 1.2 : 1;
  return Math.round(base * qualityMult(q) * comboMult() * rushMult * officeMult * qaMult);
}

// central Si gain — also accrues lifetime total and checks fab level-up
function gainSi(n){
  state.silicon += n;
  state.lifetimeSi += n;
  checkFabLevel();
}

function checkFabLevel(){
  let lv = 1;
  for (const t of FAB_LEVELS){ if (state.lifetimeSi >= t.si) lv = t.lv; }
  if (lv > state.fabLevel){
    state.fabLevel = lv;
    const info = FAB_LEVELS[lv-1];
    unlock('FAB_LV'+lv, '🏭 ' + info.name + ' 승급!', 0);
    if (lv === 5){
      triggerEnding('gigafab');
    } else {
      speak('self', '🏭 팹 승급! ' + info.name, 180);
      setTimeout(() => {
        toast('🏭 FAB 등급 상승!<br>Lv.' + lv + '  ' + info.name +
              '<br><small>출하 기본 단가 ' + info.base + ' Si</small>', 3200);
      }, 200);
    }
  }
}

function gradeScore(g){ return { S:5, A:4, B:3, C:2, D:1 }[g]; }
function gradeColor(g){ return { S:'#ffd24a', A:C.grnHi, B:'#6aa8e0', C:C.badge, D:C.red }[g]; }
function gradeHi(v, th){ return v>=th[0]?'S':v>=th[1]?'A':v>=th[2]?'B':v>=th[3]?'C':'D'; }
function gradeLo(v, th){ return v<=th[0]?'S':v<=th[1]?'A':v<=th[2]?'B':v<=th[3]?'C':'D'; }

function buildReport(reason){
  const ships = Math.max(1, state.shipTotal);
  const perfectRatio = state.perfectTotal / ships;
  const scrapRatio = state.scrapTotal / ships;
  const collapseRate = state.collapseCount / Math.max(1, state.day);

  const axes = [
    { key:'생산 규모', grade: gradeHi(state.lifetimeSi, [1500,800,400,150]),
      detail: '누적 ' + state.lifetimeSi + ' Si' },
    { key:'품질',     grade: gradeHi(perfectRatio, [0.5,0.35,0.2,0.08]),
      detail: 'Perfect ' + state.perfectTotal + '/' + state.shipTotal + ' (' + Math.round(perfectRatio*100) + '%)' },
    { key:'숙련도',   grade: gradeHi(state.maxCombo, [10,7,5,3]),
      detail: '최고 콤보 x' + state.maxCombo },
    { key:'효율',     grade: gradeLo(scrapRatio, [0.05,0.12,0.22,0.4]),
      detail: 'Scrap ' + state.scrapTotal + '개 폐기' },
    { key:'워라밸',   grade: gradeLo(collapseRate, [0.05,0.18,0.35,0.55]),
      detail: '과로(자동취침) ' + state.collapseCount + '회' },
    { key:'신뢰',     grade: gradeHi(state.questDone, [10,6,3,1]),
      detail: '퀘스트 ' + state.questDone + '회 완료' },
  ];
  const avg = axes.reduce((s,a)=>s+gradeScore(a.grade),0) / axes.length;
  const overall = avg>=4.5?'S' : avg>=3.7?'A' : avg>=2.8?'B' : avg>=1.8?'C' : 'D';
  const baseTitle = { S:'전설의 팹 매니저', A:'베테랑 경영자', B:'성실한 라인장', C:'신입 엔지니어', D:'수습 사원' }[overall];
  let title = baseTitle;
  if (axes[4].grade === 'D') title = '워커홀릭 ' + baseTitle;          // 워라밸 D
  else if (overall === 'S' && axes[1].grade === 'S') title = '품질의 거장';
  else if (overall === 'S' && axes[0].grade === 'S') title = '양산왕';

  return {
    reason, axes, overall, title,
    headline: reason==='gigafab' ? '국내 최대 기가팹 완공!' : '창업 1년차 결산 발표',
    sub: reason==='gigafab' ? 'Lv.5 GIGAFAB 달성 · Day ' + state.day : 'Day 28 — 첫 해를 마치며',
    krw: state.krw, achv: Object.keys(state.achv).length, fabLevel: state.fabLevel,
  };
}

// ============================================================
//  AUTOMATION (Phase 1–2) — a 3-STAGE auto production line:
//    LITHO → ETCH → QA·PACK.  Each stage has parallel "lines"
//    (capacity) and a WIP buffer feeds the next. The slowest stage
//    is the BOTTLENECK — it caps total throughput while the upstream
//    buffer backs up and downstream lines starve. Add lines to the
//    bottleneck to raise output. Never touches the manual machines,
//    so hand-play stays the premium path to PERFECT. Lines handle
//    VOLUME; auto ships count toward fab scale, not combos/quests.
// ============================================================
function L2(ko, en){ return state.lang === 'en' ? en : ko; }
const AUTO = {
  unlockCost: 120,    // Si to switch the automation program on
  maxLines: 5,        // max parallel lines per stage
  buffMax: 12,        // WIP buffer cap between stages (creates backpressure)
  powerPerWafer: 5,   // power drained per auto-shipped wafer
  stages: [
    { key:'litho', ko:'노광',      en:'Litho',   rate:4, lineBase:90, lineStep:80 },
    { key:'etch',  ko:'식각',      en:'Etch',    rate:6, lineBase:70, lineStep:60 },
    { key:'pack',  ko:'검사·출하', en:'QA·Pack', rate:8, lineBase:60, lineStep:50 },
  ],
};
function autoPowerCost(){ return Math.max(1, Math.round(AUTO.powerPerWafer * (state.research.done.eco ? 0.7 : 1) * techPowerMul())); }
function autoQualityRoll(){
  const m = techAutoQualityMul() * contamYieldMul();
  const pPerfect = Math.max(0, Math.min(0.5, 0.03 * m));
  const pGood = Math.max(pPerfect, Math.min(0.9, 0.15 * m));
  const r = Math.random();
  if (r < pPerfect) return 2;
  if (r < pGood) return 1;
  return 0;
}
// per-stage throughput in wafers/min (lines × base × upgrade/research mods)
function stageRate(i){
  const s = AUTO.stages[i];
  let m = 1;
  if (i === 0) m += 0.22 * state.upgrades.lithoBoost;   // litho speed upgrade
  if (i === 1) m += 0.22 * state.upgrades.etchBoost;    // etch speed upgrade
  if (state.research.done.autoAlign) m *= 1.20;         // AI auto-align research
  return s.rate * state.auto.lines[i] * m * techAutoRateMul();
}
// achievable ship rate = the slowest stage (the bottleneck caps everything)
function autoThroughput(){
  if (!state.auto.unlocked || !state.auto.on) return 0;
  let m = stageRate(0);
  for (let i=1;i<3;i++) m = Math.min(m, stageRate(i));
  return +m.toFixed(1);
}
function autoBottleneck(){
  let bi=0, br=stageRate(0);
  for (let i=1;i<3;i++){ const r=stageRate(i); if (r < br){ br=r; bi=i; } }
  return bi;
}
function autoLineCost(i){ const s = AUTO.stages[i]; return s.lineBase + s.lineStep * (state.auto.lines[i]-1); }
function autoUnlock(){
  if (state.auto.unlocked) return;
  if (state.silicon < AUTO.unlockCost){ speak('self', L2('Si 부족 ('+AUTO.unlockCost+' 필요)','Need '+AUTO.unlockCost+' Si'), 90); return; }
  state.silicon -= AUTO.unlockCost;
  state.auto.unlocked = true; state.auto.on = true;
  state.auto.lines = [1,1,1];
  unlock('AUTO_UNLOCK', L2('⚙ 자동화 가동!','⚙ Automation online!'), 0);
  speak('self', L2('⚙ 자동 라인 가동! (노광→식각→출하)','⚙ Auto-line online! (Litho→Etch→Pack)'), 150);
}
function autoBuyLine(i){
  const a = state.auto;
  if (!a.unlocked){ autoUnlock(); return; }
  if (a.lines[i] >= AUTO.maxLines){ speak('self', L2('라인 최대','Lines maxed'), 80); return; }
  const cost = autoLineCost(i);
  if (state.silicon < cost){ speak('self', L2('Si 부족 ('+cost+' 필요)','Need '+cost+' Si'), 90); return; }
  state.silicon -= cost; a.lines[i]++; a.on = true;
  const s = AUTO.stages[i];
  if (!state.achv.AUTO_LINE) unlock('AUTO_LINE', L2('🏭 라인 증설!','🏭 Line added!'), 0);
  speak('self', L2(s.ko+' 라인 +1 (x'+a.lines[i]+')', s.en+' line +1 (x'+a.lines[i]+')'), 120);
}
function autoToggle(){
  if (!state.auto.unlocked){ speak('self', L2('먼저 자동화 가동 필요','Unlock automation first'), 90); return; }
  state.auto.on = !state.auto.on;
  speak('self', state.auto.on ? L2('⚙ 자동화 ON','⚙ Automation ON') : L2('⚙ 자동화 OFF','⚙ Automation OFF'), 90);
}
function tickAuto(){
  const a = state.auto;
  if (!a.unlocked || !a.on) return;
  if (state.won || state.ending) return;
  const rL = stageRate(0)/3600, rE = stageRate(1)/3600, rP = stageRate(2)/3600;   // wafers per frame
  // LITHO: infinite raw → buffer 0 (capped = backpressure)
  a.buf[0] = Math.min(AUTO.buffMax, a.buf[0] + rL);
  // ETCH: buffer 0 → buffer 1
  { const move = Math.min(rE, a.buf[0], AUTO.buffMax - a.buf[1]); a.buf[0] -= move; a.buf[1] += move; }
  // QA·PACK: buffer 1 → packer, then ship whole wafers (power-limited)
  { const move = Math.min(rP, a.buf[1]); a.buf[1] -= move; a.prog = Math.min(AUTO.buffMax, a.prog + move); }
  const cost = autoPowerCost();
  let shippedNow = 0, sumR = 0, scrapNow = 0;
  while (a.prog >= 1){
    if (state.power < cost){ a.stalled = true; break; }
    state.power = Math.max(0, state.power - cost);
    a.prog -= 1;
    if (state.contam > CONTAM.warnAt && Math.random() < ((state.contam - CONTAM.warnAt) / (100 - CONTAM.warnAt)) * 0.4){ a.scrapped++; scrapNow++; continue; }
    const q = autoQualityRoll();
    const base = fabInfo().base + (state.research.done.nextNode ? 4 : 0);
    const reward = Math.max(1, Math.round(base * qualityMult(q) * 0.85));
    gainSi(reward); a.siEarned += reward; a.shipped++;
    if (q === 2) a.perfect++; else if (q === 1) a.good++;
    state.shipTotal++; shippedNow++; sumR += reward;
    deliverToContracts(q);   // auto output also fills contracts (Phase 3)
  }
  if (shippedNow > 0){
    a.stalled = false; a.lastShipT = state.t;
    if (state.scene === 'fab') spawnFloater(448, 196, '+' + sumR + ' ⚙', '#fff2bc', { size: 6, life: 40 });
  }
  // contamination accrues from everything the line processed this frame (Phase 5)
  const processed = shippedNow + scrapNow;
  if (processed > 0) state.contam = Math.min(100, state.contam + processed * CONTAM.perWafer * techContamMul());
  if (a.on) state.contam = Math.min(100, state.contam + CONTAM.idleRise * techContamMul());
  if (state.contam >= CONTAM.warnAt && !state._contamWarn){ state._contamWarn = true; toast(L2('⚠ 오염도 높음 — 정비 필요 (P→M)','⚠ Contamination high — maintenance (P→M)'), 2600); }
  if (state.contam < CONTAM.warnAt - 15) state._contamWarn = false;
  a.bottleneck = autoBottleneck();
}

// ============================================================
//  CONTRACTS (Phase 3) — an order market layered over fixed-price
//  shipping. Accept orders (qty · min grade · deadline · reward);
//  every shipped wafer (manual OR auto) that meets a grade routes to
//  the most demanding active contract it qualifies for, paying a
//  small per-wafer fee and a big bonus on completion. Base ship Si
//  is unchanged — contracts are the growth engine on top.
// ============================================================
const CONTRACT = { maxActive: 3, boardSize: 3 };
const CLIENTS = [
  ['한빛전자','Hanbit Elec'], ['대성반도체','Daesung Semi'], ['누리테크','Nuri Tech'],
  ['상록시스템','Sangrok Sys'], ['진우일렉트로닉스','Jinwoo Elec'], ['세영디스플레이','Seyoung Disp'],
  ['고려마이크로','Koryo Micro'], ['한결소자','Hangyeol Devices'],
];
const QTAG = [['일반','N'], ['우수','G'], ['완벽','P']];   // min-grade label (KO short / EN short)
function qTagCol(q){ return q===2 ? '#a85820' : q===1 ? '#2e8a4a' : '#6a5838'; }
function pickWeightedQ(){ const r = Math.random(); if (r < 0.13) return 2; if (r < 0.45) return 1; return 0; }
function genContract(){
  const c = state.contracts;
  const fab = state.fabLevel;
  const minQ = pickWeightedQ();
  const qty = 4 + fab*2 + ((Math.random()*7)|0);
  const tight = Math.random() < 0.30;
  const days = Math.max(1, (tight ? (1 + ((Math.random()*2)|0)) : (3 + ((Math.random()*3)|0))) + techDeadlineDelta());
  const base = fabInfo().base;
  const qPrem = 1 + minQ*0.7;
  const rushPrem = tight ? 1.5 : 1;
  const reward = Math.round(qty * base * qPrem * rushPrem * 1.4 * techContractRewardMul());
  const perWafer = Math.max(1, Math.round(base * 0.4));
  const cl = CLIENTS[(Math.random()*CLIENTS.length)|0];
  return { id:(++c._id), client:cl, qty, minQ, reward, perWafer, days, deadline: state.day + days, progress:0, rush:tight };
}
function seedContracts(){
  const c = state.contracts;
  c.available = [];
  for (let i=0;i<CONTRACT.boardSize;i++) c.available.push(genContract());
  c.sel = 0;
}
function acceptContract(i){
  const c = state.contracts;
  if (i < 0 || i >= c.available.length){ return; }
  if (c.active.length >= CONTRACT.maxActive){ speak('self', L2('계약 슬롯 가득 (최대 3)','Contract slots full (max 3)'), 110); return; }
  const job = c.available.splice(i,1)[0];
  job.deadline = state.day + job.days;   // refresh deadline from acceptance day
  c.active.push(job);
  if (c.sel >= c.available.length) c.sel = Math.max(0, c.available.length-1);
  if (!state.achv.CONTRACT_TAKE) unlock('CONTRACT_TAKE', L2('📋 첫 계약 수락','📋 First contract'), 0);
  speak('self', L2('📋 계약 수락 — ' + (state.lang==='en'?job.client[1]:job.client[0]), '📋 Accepted — ' + (state.lang==='en'?job.client[1]:job.client[0])), 120);
}
// route one shipped wafer of quality q to the best matching active contract
function deliverToContracts(q){
  const a = state.contracts.active;
  let best = null;
  for (const c of a){
    if (c.progress >= c.qty) continue;
    if (c.minQ <= q){
      if (!best || c.minQ > best.minQ || (c.minQ === best.minQ && c.deadline < best.deadline)) best = c;
    }
  }
  if (!best) return false;
  best.progress++;
  if (best.perWafer) gainSi(best.perWafer);
  if (best.progress >= best.qty) completeContract(best);
  return true;
}
function completeContract(c){
  const a = state.contracts.active;
  const idx = a.indexOf(c);
  if (idx >= 0) a.splice(idx,1);
  state.contracts.completed++;
  gainSi(c.reward);
  state.krw += Math.round(c.reward * 0.3);
  if (!state.achv.CONTRACT_DONE) unlock('CONTRACT_DONE', L2('🤝 첫 계약 완료!','🤝 First contract done!'), 0);
  if (state.contracts.completed === 10) unlock('CONTRACT_10', L2('🏆 계약 10건 완료','🏆 10 contracts done'), 0);
  spawnFloater(240, 120, '📋 +' + c.reward + ' Si', '#fff2bc', { size: 9, life: 60 });
  spawnBurst(240, 124, [C.badge, '#fff2bc', C.grnHi, '#ffffff'], 20, { spd: 2.0, up: 0.6 });
  addShake(3.2);
  const nm = state.lang==='en' ? c.client[1] : c.client[0];
  toast(L2('📋 계약 완료!<br>' + nm + '  +' + c.reward + ' Si','📋 Contract complete!<br>' + nm + '  +' + c.reward + ' Si'), 2600);
}
// called once per new day from rest(): expire overdue, refresh the board
function tickContractsDaily(){
  const c = state.contracts;
  for (let i = c.active.length - 1; i >= 0; i--){
    if (state.day > c.active[i].deadline){
      const job = c.active.splice(i,1)[0];
      c.failed++;
      const nm = state.lang==='en' ? job.client[1] : job.client[0];
      setTimeout(()=>{ toast(L2('⏰ 계약 미이행<br>' + nm,'⏰ Contract missed<br>' + nm), 2200); }, 300);
    }
  }
  seedContracts();
}

//  benefit AND a drawback, so there is no strictly-best build.
//  Nodes in the same exclusive group can't both be active (commit
//  to speed OR yield, output OR efficiency, reward OR slack). Owned
//  nodes can be freely toggled on/off to experiment. Modifiers read
//  live by the auto line (stageRate / quality / power) and the
//  contract market (reward / deadline), plus contamination (Phase 5).
// ============================================================
const TECHS = [

    plusKo:'계약 보상 +30%',         minusKo:'납기 −1일 (빡빡)',
    plusEn:'contract reward +30%',    minusEn:'deadline −1 day' },
  { id:'conservative',group:'sales',  cost:100,
    ko:'안정적 수주',     en:'Conservative Bidding', pos:[1,2],
    plusKo:'납기 +1일 (여유)',       minusKo:'계약 보상 −15%',
    plusEn:'deadline +1 day',         minusEn:'contract reward −15%' },
  { id:'cleanauto',  group:null,      cost:110,
    ko:'자동 정화 시스템', en:'Auto-Purge System',  pos:[0,3],
    plusKo:'오염 증가 −40%',         minusKo:'자동 처리량 −8%',
    plusEn:'contamination +rate −40%', minusEn:'throughput −8%' },
];
const TECH_GROUPS = [
  ['stepper', '스테퍼 — 속도 vs 수율',   'Steppers — speed vs yield'],
  ['power',   '전력 — 출력 vs 효율',     'Power — output vs efficiency'],
  ['sales',   '수주 — 보상 vs 납기',     'Sales — reward vs deadline'],
  [null,      '청정 — 오염 vs 처리량',   'Cleanroom — fouling vs throughput'],
];
function techOn(id){ return !!state.tech.on[id]; }
function techNode(id){ return TECHS.find(n => n.id === id); }
function techAutoRateMul(){
  let m = 1;
  if (techOn('overclock')) m *= 1.25;
  if (techOn('precision'))  m *= 0.85;
  if (techOn('turbo'))      m *= 1.20;
  if (techOn('lowpower'))   m *= 0.90;
  if (techOn('cleanauto'))  m *= 0.92;
  return m;
}
function techAutoQualityMul(){   // multiplier on Good+PERFECT probability
  let m = 1;
  if (techOn('overclock')) m *= 0.5;
  if (techOn('precision'))  m *= 1.6;
  return m;
}
function techPowerMul(){
  let m = 1;
  if (techOn('turbo'))    m *= 1.5;
  if (techOn('lowpower')) m *= 0.65;
  return m;
}
function techContractRewardMul(){
  let m = 1;
  if (techOn('aggressive'))   m *= 1.3;
  if (techOn('conservative')) m *= 0.85;
  return m;
}
function techDeadlineDelta(){
  let d = 0;
  if (techOn('aggressive'))   d -= 1;
  if (techOn('conservative')) d += 1;
  return d;
}
function techContamMul(){ return techOn('cleanauto') ? 0.6 : 1; }   // read by Phase 5
function techSetOn(node, val){
  state.tech.on[node.id] = val;
  if (val && node.group){
    for (const o of TECHS) if (o !== node && o.group === node.group) state.tech.on[o.id] = false;
  }
}
function techBuy(i){
  const node = TECHS[i];
  if (!node) return;
  if (!state.tech.owned[node.id]){
    if (state.silicon < node.cost){ speak('self', L2('Si 부족 ('+node.cost+' 필요)','Need '+node.cost+' Si'), 90); return; }
    state.silicon -= node.cost;
    state.tech.owned[node.id] = true;
    techSetOn(node, true);
    if (!state.achv.TECH_1) unlock('TECH_1', L2('🔬 첫 기술 도입','🔬 First tech adopted'), 0);
    speak('self', L2('🔬 ' + node.ko + ' 도입', '🔬 ' + node.en + ' adopted'), 120);
  } else {
    techSetOn(node, !state.tech.on[node.id]);
    speak('self', state.tech.on[node.id] ? L2(node.ko+' ON', node.en+' ON') : L2(node.ko+' OFF', node.en+' OFF'), 80);
  }
}

// ============================================================
//  CONTAMINATION / MAINTENANCE (Phase 5) — running the auto line
//  fouls the cleanroom. Particles raise contamination, which lowers
//  auto yield and, past a threshold, scraps wafers (power spent, no
//  Si). Purge it from the dashboard (M, costs Si) or sleep it off
//  (R, overnight). The 'cleanauto' tech slows fouling. This caps
//  mindless auto-scaling and gives rest & attention real weight.
// ============================================================
const CONTAM = {
  perWafer: 0.8,    // contamination per auto wafer processed (shipped or scrapped)
  idleRise: 0.012,  // passive rise per frame while the line is on
  manual:   0.25,   // per manually shipped wafer (hand work is cleaner)
  restClean: 35,    // removed overnight on rest()
  warnAt:   75,     // warning + scrap threshold
  purgeAmt: 60,     // contamination removed by a purge
};
function contamYieldMul(){ return 1 - (Math.max(0, Math.min(100, state.contam)) / 100) * 0.5; }   // 1.0 clean → 0.5 filthy
function autoPurge(){
  if (state.contam <= 0){ speak('self', L2('이미 깨끗합니다','Already clean'), 70); return; }
  const cost = Math.round(15 + state.contam * 0.6);
  if (state.silicon < cost){ speak('self', L2('Si 부족 ('+cost+' 필요)','Need '+cost+' Si'), 90); return; }
  state.silicon -= cost;
  state.contam = Math.max(0, state.contam - CONTAM.purgeAmt);
  state._contamWarn = false;
  if (!state.achv.CLEAN_1) unlock('CLEAN_1', L2('🧹 첫 정비','🧹 First maintenance'), 0);
  spawnFloater(240, 130, L2('🧹 정비 −' + CONTAM.purgeAmt, '🧹 clean −' + CONTAM.purgeAmt), C.grnHi, { size: 7, life: 45 });
  toast(L2('🧹 정비 완료  (−' + cost + ' Si)','🧹 Maintenance done  (−' + cost + ' Si)'), 1800);
}

// ============================================================
//  UPDATE  (per frame)
// ============================================================

function update(){
  state.t++;
  if (state.langMenu){ return; }   // language menu pauses everything
  tickFade();
  if (state.ending) return;   // freeze the world behind the ending screen
  if (state.questLogOpen){ state.pmove=false; state.pwalk=0; return; }  // quest log pauses the world
  if (state.compendiumOpen){ state.pmove=false; state.pwalk=0; return; }  // 도감 pauses the world
  if (state.npcDialog){ state.pmove=false; state.pwalk=0; return; }     // dialogue pauses the world
  if (state.dashOpen){ state.pmove=false; state.pwalk=0; return; }      // dashboard pauses the world
  if (state.contracts.open){ state.pmove=false; state.pwalk=0; return; } // contracts board pauses the world
  if (state.tech.open){ state.pmove=false; state.pwalk=0; return; }      // tech tree pauses the world
  tickClock();
  tickAchv();
  tickAuto();
  // expire messages (both scenes)
  if (state.msg && state.t > state.msg.until) state.msg = null;
  if (state.speech && state.t > state.speech.until) state.speech = null;

  // Office scene runs its own update
  if (state.scene === 'office'){ updateOffice(); return; }
  // Smock room runs its own update
  if (state.scene === 'smock'){ updateSmock(); return; }
  if (state.scene === 'break'){ updateBreak(); return; }
  if (state.scene === 'rnd'){ updateRnd(); return; }
  if (state.scene === 'roof'){ updateRoof(); return; }
  if (state.scene === 'hall'){ updateHall(); return; }
  if (state.scene === 'lobby'){ updateLobby(); return; }
  if (state.scene === 'garden'){ updateGarden(); return; }
  if (state.scene === 'mine'){ updateMine(); return; }
  if (state.scene === 'library'){ updateLibrary(); return; }

  // tick auxiliary systems (combo/rush pause during shop, minigame still resolves)
  tickMiniGame();
  tickQA();
  if (!state.shopOpen){
    tickCombo();
    tickRush();
  }

  // player movement (locked during minigame, QA, shop, or fade)
  let vx=0, vy=0;
  if (!state.miniGame && !state.qaGame && !state.shopOpen && state.fadeDir === 0){
    if (isDown('arrowup','w'))    { vy = -1; state.pdir='up'; }
    if (isDown('arrowdown','s'))  { vy =  1; state.pdir='down'; }
    if (isDown('arrowleft','a'))  { vx = -1; state.pdir='left'; }
    if (isDown('arrowright','d')) { vx =  1; state.pdir='right'; }
  }
  state.pmove = !!(vx || vy);

  if (state.pmove){
    // diagonal normalize
    if (vx && vy){ vx *= 0.707; vy *= 0.707; }
    const speed = 1.3;
    let nx = state.px + vx * speed;
    let ny = state.py + vy * speed;
    // bounds
    nx = Math.max(FLOOR_LEFT, Math.min(FLOOR_RIGHT, nx));
    ny = Math.max(FLOOR_TOP, Math.min(FLOOR_BOT, ny));
    // collision with stations (feet must stay below their bottoms or to side)
    for (const s of STATIONS){
      if (s.id === 'npc' || s.id === 'crate' || s.id === 'exit' || s.id === 'shop' || s.id === 'qa' || s.id === 'minedoor') continue;
      const sx0=s.x, sx1=s.x+s.w, sy0=s.y, sy1=s.y+s.h;
      // expand a bit for visual collision (player width ~ 8)
      if (nx > sx0 - 4 && nx < sx1 + 4 && ny > sy0 - 2 && ny < sy1 + 2){
        // try axis-separated
        const tryX = state.px + vx*speed;
        if (!(tryX > sx0 - 4 && tryX < sx1 + 4 && state.py > sy0 - 2 && state.py < sy1 + 2)){
          nx = tryX; ny = state.py;
        } else {
          const tryY = state.py + vy*speed;
          if (!(state.px > sx0 - 4 && state.px < sx1 + 4 && tryY > sy0 - 2 && tryY < sy1 + 2)){
            nx = state.px; ny = tryY;
          } else {
            nx = state.px; ny = state.py;
          }
        }
      }
    }
    state.px = nx; state.py = ny;

    // walk anim
    state.pwalkAcc += speed;
    if (state.pwalkAcc > 5){
      state.pwalkAcc = 0;
      state.pwalk = (state.pwalk + 1) % 4;
    }
  } else {
    state.pwalk = 0;
  }

  // machine timers
  if (state.lithoBusy > 0){
    state.lithoBusy--;
    if (state.lithoBusy === 0){
      state.lithoOut = true;
      const tag = state.lithoOutQ === 2 ? 'Litho 완료 (PERFECT!)' : 'Litho 완료';
      speak('self', tag, 80);
    }
  }
  if (state.etchBusy > 0){
    state.etchBusy--;
    if (state.etchBusy === 0){
      state.etchOut = true;
      const tag = state.etchOutQ === 2 ? 'Etch 완료 (PERFECT!)' : 'Etch 완료';
      speak('self', tag, 80);
    }
  }

  // resource drift
  if (state.t % 90 === 0){
    const drift = state.furniture.plant ? 0.08 : 0.2;
    state.temp += (Math.random()-0.5) * drift;
    if (state.furniture.plant){ state.temp += (22.0 - state.temp) * 0.06; } // gentle pull to 22
    state.temp = Math.max(20.5, Math.min(24.5, state.temp));
  }
  if ((state.lithoBusy > 0 || state.etchBusy > 0) && state.t % 30 === 0){
    const rise = state.furniture.plant ? 0.03 : 0.05;
    state.temp = Math.min(24.5, state.temp + rise);
  }

  // expire messages
  if (state.msg && state.t > state.msg.until) state.msg = null;
  if (state.speech && state.t > state.speech.until) state.speech = null;

  // interaction prompt
  const ns = nearestStation();
  state.prompt = ns;
}

function drawEtcher(){

    const tp = (state.t*0.04 + phase) % 1;
    if (tp < 0.05 || tp > 0.95) return;
    const yOff = -tp * 22;
    const a = tp < 0.15 ? tp/0.15 : (tp > 0.85 ? (1-tp)/0.15 : 1);
    ctx.globalAlpha = 0.7 * a;
    R(ox, -2 + yOff, 2, 2, '#d098e0');
    ctx.globalAlpha = 0.7 * a;
    R(ox+2, -4 + yOff, 2, 2, '#e8b0f4');

    R(ox, -6 + yOff, 3, 2, '#f4c8ff');
    ctx.globalAlpha = 1;

  wisp(36, 0);

  R(13,11,1,8,C.outline);

  R(2,26,10,1,C.outline);

// ============================================================
//  JUICE — floating numbers, particle bursts, screen shake
// ============================================================
function spawnFloater(x, y, text, color, opts){
  opts = opts || {};
  state.floaters.push({ x, y, text, color, born: state.t,
    life: opts.life || 50, vy: opts.vy != null ? opts.vy : -0.5, size: opts.size || 7 });
  if (state.floaters.length > 40) state.floaters.shift();
}
function spawnBurst(x, y, colors, n, opts){
  opts = opts || {}; n = n || 10;
  for (let i=0;i<n;i++){
    const a = Math.random()*Math.PI*2;
    const sp = (opts.spd || 1.2) * (0.4 + Math.random());
    state.particles.push({
      x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - (opts.up || 0.3),
      born: state.t, life: (opts.life || 28) + Math.random()*12,
      color: colors[(Math.random()*colors.length)|0],
      size: (Math.random() < 0.35 ? 2 : 1),
      grav: opts.grav != null ? opts.grav : 0.06,
    });
  }
  if (state.particles.length > 220) state.particles.splice(0, state.particles.length-220);
}
function addShake(amt){ state.shake = Math.min(6, state.shake + amt); }
function tickJuice(){
  for (let i=state.floaters.length-1;i>=0;i--){
    const f=state.floaters[i]; f.y += f.vy; f.vy *= 0.97;
    if (state.t - f.born > f.life) state.floaters.splice(i,1);
  }
  for (let i=state.particles.length-1;i>=0;i--){
    const p=state.particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=p.grav; p.vx*=0.98;
    if (state.t - p.born > p.life) state.particles.splice(i,1);
  }
  if (state.shake > 0){ state.shake *= 0.84; if (state.shake < 0.2) state.shake = 0; }
  // sparkle on a carried PERFECT wafer
  if (state.scene === 'fab' && state.carry && state.carryQ === 2 && (state.t % 12 === 0)){
    state.particles.push({ x: state.px + (Math.random()*10-5), y: state.py - 14 - Math.random()*6,
      vx: 0, vy: -0.25, born: state.t, life: 18, color: '#fff2bc', size: 1, grav: -0.005 });
  }
}
function drawParticles(){
  for (const p of state.particles){
    const t=(state.t-p.born)/p.life;
    if (t > 0.65) ctx.globalAlpha = Math.max(0, 1-(t-0.65)/0.35);
    R(p.x|0, p.y|0, p.size, p.size, p.color);
    ctx.globalAlpha = 1;
  }
}
function drawFloaters(){
  for (const f of state.floaters){
    const t=(state.t-f.born)/f.life;
    ctx.globalAlpha = t > 0.6 ? Math.max(0, 1-(t-0.6)/0.4) : 1;
    txt(f.text, (f.x+1)|0, (f.y+1)|0, f.size, '#1a1208', 'center');
    txt(f.text, f.x|0, f.y|0, f.size, f.color, 'center');
    ctx.globalAlpha = 1;
  }
}

  R(bx, by, bw, bh, C.boot);
  R(bx, by, bw, 1, C.bootHi);

  R(bx+1, by+1, bw-2, bh-2, C.red);

  R(bx + goodX, by+1, goodW, bh-2, C.badge);
  const perfX = Math.round(bw * 0.45), perfW = Math.round(bw * 0.10);
  R(bx + perfX, by+1, perfW, bh-2, C.grnHi);

  R(bx + goodX, by, 1, bh, C.parchment);
  R(bx + goodX + goodW, by, 1, bh, C.parchment);

  // marker
  const mx = bx + m.pos * bw;

  // 기술 서적(책장) 힌트: PERFECT 존을 강조하고 마커가 들어오면 NOW! 표시
  if (state.furniture.bookshelf && !m.result){
    const pad = 0.025 * state.upgrades.perfect + (state.research.done.yieldUp ? 0.04 : 0);

    // glowing target band
    const pulse = 0.5 + 0.5*Math.abs(Math.sin(state.t*0.2));

    R(bx + Math.round(bw*pMin), by-2, Math.round(bw*(pMax-pMin)), bh+4, C.grnXHi);

    R(cxh-1, by-9, 2, 3, C.grnHi);

    if (m.pos > pMin && m.pos < pMax){
      txt('NOW!', W/2, by-12, 7, C.grnXHi, 'center');
    }
  }

  // hint / result
  if (m.result){
    const cmap = { perfect: C.grnHi, good: C.badge, bad: C.red };
    const tmap = { perfect: '⭐ PERFECT! +1 등급', good: 'GOOD ✓', bad: '✗ SCRAP!' };

    txt('Space 로 정지 — 중앙(녹색)이 PERFECT', W/2, by+bh+10, 6, C.parchHi, 'center');
  }
}

  ctx.fillStyle = '#13351f'; ctx.fillRect(QA_CX-QA_R, QA_CY-QA_R, QA_R*2, QA_R*2);
  // circuit die grid (visual noise to scan through)
  for (let gx=-QA_R; gx<QA_R; gx+=11){
    R(QA_CX+gx, QA_CY-QA_R, 1, QA_R*2, '#1c4a2c');
  }
  for (let gy=-QA_R; gy<QA_R; gy+=11){
    R(QA_CX-QA_R, QA_CY+gy, QA_R*2, 1, '#1c4a2c');
  }
  // some circuit traces / pads
  for (let i=0;i<28;i++){
    const sx = QA_CX-QA_R + ((i*53)%(QA_R*2));
    const sy = QA_CY-QA_R + ((i*37)%(QA_R*2));
    R(sx, sy, 4, 1, '#2c6a40');
    if (i%3===0) R(sx, sy, 2, 2, '#3a8c5c');
  }
  // sheen
  ctx.fillStyle = 'rgba(160,220,255,0.06)';
  ctx.fillRect(QA_CX-QA_R, QA_CY-QA_R, QA_R*2, QA_R);

  // defects
  for (const d of g.defects){
    if (d.found){
      // marked: green ring + check
      ctx.strokeStyle = C.grnHi; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(d.x, d.y, d.r+5, 0, Math.PI*2); ctx.stroke();
      R(d.x-1, d.y, 2, 2, C.grnHi); R(d.x, d.y+1, 2, 1, C.grnHi);
    } else {
      // unfound: subtle reddish blemish that pulses (the "hunt")
      const pulse = 0.55 + 0.45*Math.sin(state.t*0.12 + d.ph);
      ctx.globalAlpha = 0.55 + 0.35*pulse;
      ctx.fillStyle = '#7a2e1c';
      ctx.beginPath(); ctx.arc(d.x, d.y, d.r+1.5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#c0442a';
      ctx.beginPath(); ctx.arc(d.x, d.y, d.r-0.5, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
    }
  }
  ctx.restore();

  // crosshair reticle following the mouse (inside lens only)
  if (!g.result && Math.hypot(state.qaMouse.x-QA_CX, state.qaMouse.y-QA_CY) <= QA_R){
    const mxp = state.qaMouse.x, myp = state.qaMouse.y;
    ctx.strokeStyle = 'rgba(180,230,255,0.7)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(mxp, myp, 6, 0, Math.PI*2); ctx.stroke();
    R(mxp-9, myp, 5, 1, '#b4e6ff'); R(mxp+5, myp, 5, 1, '#b4e6ff');
    R(mxp, myp-9, 1, 5, '#b4e6ff'); R(mxp, myp+5, 1, 5, '#b4e6ff');
  }
  // click ripple
  if (g.ripple && state.t - g.ripple.t < 14){
    const age = (state.t - g.ripple.t) / 14;
    ctx.strokeStyle = g.ripple.hit ? 'rgba(116,196,144,'+(1-age)+')' : 'rgba(196,72,48,'+(1-age)+')';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(g.ripple.x, g.ripple.y, 3+age*8, 0, Math.PI*2); ctx.stroke();
  }

  // lens rim highlight
  ctx.strokeStyle = '#6a8ab0'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(QA_CX, QA_CY, QA_R, 0, Math.PI*2); ctx.stroke();

  // HUD: found count + timer
  txt('결함 ' + g.found + ' / ' + g.total, QA_CX, QA_CY+QA_R+22, 7,
      g.found===g.total ? C.grnHi : C.parchment, 'center');
  // timer bar
  const tb = 160, tx = QA_CX - tb/2, ty = QA_CY+QA_R+28;
  R(tx, ty, tb, 5, '#1a2230');
  const tf = Math.max(0, g.timeLeft / QA_TIME);
  R(tx, ty, Math.round(tb*tf), 5, tf < 0.3 ? C.red : '#88c0e0');

  // result banner
  if (g.result){
    const c = g.result.grade === 'A' ? '#ffd24a' : g.result.grade === 'B' ? C.grnHi : C.badge;
    R(QA_CX-130, QA_CY-12, 260, 24, 'rgba(20,16,26,0.85)');
    txt(g.result.label, QA_CX, QA_CY+4, 7, c, 'center');
  } else {
    txt('마우스로 클릭  ·  Esc 종료', QA_CX, ty+16, 5, C.parchMid, 'center');
  }
}

function nearestOfficeStation(){
  let best = null, bd = 999;
  for (const s of OFFICE_STATIONS){
    const dx = state.ox - s.doorX, dy = state.oy - s.doorY;
    const d = Math.hypot(dx, dy);
    if (d < 22 && d < bd){ bd = d; best = s; }
  }
  return best;
}

function handleOfficeKey(k){
  const w = state.officeWork;
  // furniture shop modal
  if (state.officeShopOpen){
    if (k === 'b' || k === 'escape') closeOfficeShop();
    else if (k === 'arrowup' || k === 'w') officeShopMove(-1);
    else if (k === 'arrowdown' || k === 's') officeShopMove(1);
    else if (k === 'enter' || k === ' ') officeShopBuy();
    return;
  }
  // document session modal (open session or result screen)
  if (w && (w.open || w.result)){
    if (w.result){
      if (k === ' ' || k === 'enter' || k === 'escape') state.officeWork = null;
      return;
    }
    // mid-session: Esc pauses (keeps progress), 1/2/3 decide
    if (k === 'escape'){
      w.open = false;
      showMsg('업무 일시중지 — 책상에서 이어하기');
      return;
    }
    if (k === '1') officeDecide('approve');
    else if (k === '2') officeDecide('reject');
    else if (k === '3') officeDecide('defer');
    return;
  }
  // roaming the office (also when a session is paused)
  if (k === ' ' || k === 'e') officeInteract();
  if (k === 'r') rest();
  if (k === 'b') openOfficeShop();
}

function openOfficeShop(){ state.officeShopOpen = true; state.officeShopCursor = 0; }
function closeOfficeShop(){ state.officeShopOpen = false; state.officeShopFlash = 0; }
function officeShopMove(d){
  let n = state.officeShopCursor + d;
  if (n < 0) n = OFFICE_SHOP_ITEMS.length - 1;
  if (n >= OFFICE_SHOP_ITEMS.length) n = 0;
  state.officeShopCursor = n;
}
function officeShopBuy(){
  const item = OFFICE_SHOP_ITEMS[state.officeShopCursor];
  if (state.furniture[item.id]){ speak('self','이미 보유 중', 70); return; }
  if (state.krw < item.price){ speak('self','KRW 부족!', 70); return; }
  state.krw -= item.price;
  state.furniture[item.id] = true;
  state.officeShopFlash = 30;
  speak('self', item.name + ' 설치 완료!', 120);
  unlock('FIRST_FURNITURE', '🛋️ 첫 가구 설치!', 0);
  if (OFFICE_SHOP_ITEMS.every(it => state.furniture[it.id])) unlock('FULL_OFFICE', '🏢 사무실 풀세팅!', 0);
}

function officeInteract(){
  const s = nearestOfficeStation();
  if (!s) return;
  if (s.id === 'desk') startOfficeWork();
  else if (s.id === 'shop') openOfficeShop();
  else if (s.id === 'fabdoor') switchScene('smock');
  else if (s.id === 'breakdoor') switchScene('break');
  else if (s.id === 'rnddoor') switchScene('rnd');
  else if (s.id === 'halldoor') switchScene('hall');
  else if (s.id === 'npc') talkNpc();
}

function updateOffice(){
  const modalOpen = state.officeShopOpen || (state.officeWork && (state.officeWork.open || state.officeWork.result));
  // movement (locked only while the document modal is open, or during fade)
  let vx=0, vy=0;
  if (!modalOpen && state.fadeDir === 0){
    if (isDown('arrowup','w'))    { vy = -1; state.pdir='up'; }
    if (isDown('arrowdown','s'))  { vy =  1; state.pdir='down'; }
    if (isDown('arrowleft','a'))  { vx = -1; state.pdir='left'; }
    if (isDown('arrowright','d')) { vx =  1; state.pdir='right'; }
  }
  state.pmove = !!(vx || vy);
  if (state.pmove){
    if (vx && vy){ vx *= 0.707; vy *= 0.707; }
    const speed = 1.3;
    let nx = state.ox + vx*speed;
    let ny = state.oy + vy*speed;
    nx = Math.max(OFFICE_LEFT, Math.min(OFFICE_RIGHT, nx));
    ny = Math.max(OFFICE_TOP, Math.min(OFFICE_BOT, ny));
    // collide with desk only (door is walkable)
    for (const s of OFFICE_STATIONS){
      if (s.id !== 'desk') continue;
      const sx0=s.x, sx1=s.x+s.w, sy0=s.y, sy1=s.y+s.h;
      if (nx > sx0-4 && nx < sx1+4 && ny > sy0-2 && ny < sy1+2){
        const tryX = state.ox + vx*speed;
        if (!(tryX > sx0-4 && tryX < sx1+4 && state.oy > sy0-2 && state.oy < sy1+2)){ nx = tryX; ny = state.oy; }
        else { const tryY = state.oy + vy*speed;
          if (!(state.ox > sx0-4 && state.ox < sx1+4 && tryY > sy0-2 && tryY < sy1+2)){ nx = state.ox; ny = tryY; }
          else { nx = state.ox; ny = state.oy; } }
      }
    }
    state.ox = nx; state.oy = ny;
    state.pwalkAcc += speed;
    if (state.pwalkAcc > 5){ state.pwalkAcc = 0; state.pwalk = (state.pwalk+1)%4; }
  } else { state.pwalk = 0; }

  const ns = nearestOfficeStation();
  const w = state.officeWork;
  if (ns && ns.id === 'desk' && w && !w.result && !w.open){
    state.prompt = { ...ns, prompt: '서류 이어하기 (' + w.idx + '/' + w.docs.length + ')' };
  } else {
    state.prompt = ns;
  }
}

            const correct = b > c*1.25 ? 'approve' : (b < c*0.85 ? 'reject' : 'defer');
            return { icon:'won', title:'예산 결재', detail:'비용 '+c+' / 효과 '+b, correct, krw: 60 }; },
    () => { return { icon:'leaf', title:'휴가 신청', detail:'인력 충분 — 승인 적정', correct:'approve', krw: 35 }; },
    () => { return { icon:'warn', title:'규정 위반 보고', detail:'반려 후 재조치 필요', correct:'reject', krw: 55 }; },
  ];
  const out = [];
  for (let i=0;i<n;i++) out.push(templates[Math.floor(Math.random()*templates.length)]());
  return out;
}

function startOfficeWork(){
  // resume a paused (in-progress) session if one exists
  if (state.officeWork && !state.officeWork.result){
    state.officeWork.open = true;
    return;
  }
  if (state.officeDoneToday){ showMsg('오늘 업무 완료 — 휴식(R) 후 다시'); return; }
  state.officeWork = {
    docs: genDocs(6), idx:0, correct:0, krwEarned:0, combo:0,
    lastResult:null, lastAt:0, result:null, open:true,
  };
}

function officeDecide(action){
  const w = state.officeWork;
  if (!w || w.result) return;
  const doc = w.docs[w.idx];
  const ok = doc.correct === action;
  const stampTxt = action === 'approve' ? '승인' : action === 'reject' ? '반려' : '보류';
  if (ok){
    w.correct++;
    w.combo++;
    const bonus = 1 + Math.min(0.6, (w.combo-1)*0.15);
    w.krwEarned += Math.round(doc.krw * bonus);
    w.lastResult = 'correct';
    spawnFloater(240, 150, '✔ ' + stampTxt + (w.combo>1?(' x'+w.combo):''), C.grnHi, { size: 8, life: 40 });
    spawnBurst(240, 150, [C.grnHi, '#fff2bc', '#ffffff'], 8, { spd: 1.3, up: 0.4 });
    addShake(1.2);
  } else {
    w.combo = 0;
    w.lastResult = 'wrong';
    spawnFloater(240, 150, '✘ ' + stampTxt, C.red, { size: 8, life: 40 });
    addShake(2);
  }
  w.lastAt = state.t;
  w.idx++;
  questEvent('doc');
  if (w.idx >= w.docs.length) finishOfficeWork();
}

function finishOfficeWork(){
  const w = state.officeWork;
  const acc = w.correct / w.docs.length;
  state.krw += w.krwEarned;
  state.officeDoneToday = true;
  let buff;
  if (acc >= 0.999)      buff = { shipMult: 1.25, label: '오늘 출하 보상 +25%' };
  else if (acc >= 0.66)  buff = { shipMult: 1.10, label: '오늘 출하 보상 +10%' };
  else                   buff = { shipMult: 1.00, label: '버프 없음 (정확도 부족)' };
  state.officeBuff = buff;
  w.result = { acc, krw: w.krwEarned, buff };
  if (!state.achv.FIRST_OFFICE) unlock('FIRST_OFFICE', '🏢 첫 사무 업무!', 0);
  if (acc >= 0.999) unlock('PERFECT_OFFICE', '📈 완벽 결재! (6/6)', 0);
}

    R(wx+20,wy+wh-26,40,8,th.treeDk); R(wx+90,wy+wh-24,46,6,th.treeDk);
  } else if (sea === 2){ // FALL — maple + leaves
    R(wx+22, wy+26, 5, 32, th.treeDk);
    for (const [bx,by,r] of [[16,24,12],[32,28,10],[10,32,9]]){
      R(wx+bx, wy+by, r, r-1, th.tree);
      R(wx+bx+1, wy+by, 3, 2, '#f0a040');
    }
    R(wx,wy+wh-10,ww,10,'#c89858');
    for (let i=0;i<7;i++){ const px=(state.t*0.5 + i*32)%ww; const py=(state.t*0.7+i*18)%wh; R(wx+px|0, wy+py|0, 2,2, th.accent); }
  } else { // WINTER — snow + bare tree
    R(wx+20, wy+22, 4, 36, th.treeDk);
    for (const [ex,ey,el] of [[24,30,12],[12,36,10],[24,42,14]]){ R(wx+ex,wy+ey,el,2,th.treeDk); }
    R(wx,wy+wh-12,ww,12,'#eef4fa');
    for (let i=0;i<10;i++){ const px=(state.t*0.3 + i*26 + Math.sin(state.t*0.02+i)*8)%ww; const py=(state.t*0.5+i*14)%wh; R(wx+px|0, wy+py|0, 2,2, '#ffffff'); }
  }
  // weather seen through the glass
  if (state.weather !== 'clear'){
    ctx.globalAlpha = 0.16; R(wx, wy, ww, wh, '#3a4656'); ctx.globalAlpha = 1;
    if (state.weather === 'rain'){
      ctx.globalAlpha = 0.55;
      for (let i=0;i<26;i++){ const x=wx+((i*29 + state.t*4) % ww); const y=wy+((i*17 + state.t*9) % wh); R(x|0, y|0, 1, 4, '#bcd0e4'); }

      ctx.globalAlpha = 1;
    }
  }
  // window cross bars
  R(wx+ww/2-1, wy, 2, wh, frame);
  R(wx, wy+wh/2-1, ww, 2, frame);
}

// ============================================================
//  SMOCK / GOWNING ROOM — hub between fab and office
// ============================================================

function nearestSmockStation(){
  let best=null, bd=999;
  for (const s of SMOCK_STATIONS){
    const d = Math.hypot(state.sx - s.doorX, state.sy - s.doorY);
    if (d < 22 && d < bd){ bd=d; best=s; }
  }
  return best;
}

function handleSmockKey(k){
  if (state.crafting > 0) return;   // busy crafting
  if (k === ' ' || k === 'e') smockInteract();
}

function smockInteract(){
  const s = nearestSmockStation();
  if (!s) return;
  if (s.id === 'changer'){
    toggleSmock();
  } else if (s.id === 'fabdoor'){
    if (!state.smockOn){ showMsg('⚠ FAB 입장 불가 — smock을 착용하세요'); return; }
    switchScene('fab');
  } else if (s.id === 'officedoor'){
    if (state.smockOn){ showMsg('⚠ 사무실 입장 불가 — smock을 벗으세요'); return; }
    switchScene('office');
  } else if (s.id === 'craftbox'){
    startCraft();
  } else if (s.id === 'npc'){
    talkNpc();
  }
}

function toggleSmock(){
  state.smockOn = !state.smockOn;
  speak('self', state.smockOn ? '🥼 smock 착용 완료' : '👔 평상복으로', 120);
}

function updateSmock(){
  // wafer crafting in progress (the airlock prep)
  if (state.crafting > 0){
    state.crafting--;
    if (state.crafting === 1){
      state.inventory.ore -= ORE_PER_WAFER;
      state.power = Math.max(0, state.power - 4);
      state.hour += 0.5;
      state.carry = 'raw';
      state.carryQ = Math.random() < 0.5 ? 1 : 0;     // crafted wafers: 50% Good head-start
      state.carryQA = null;
      const tag = state.carryQ===1 ? 'Good 웨이퍼 완성!' : '실리콘 웨이퍼 완성';
      speak('self', '🟢 ' + tag + ' — smock 착용 후 팹으로', 170);
      spawnFloater(322, 150, tag, state.carryQ===1?C.grnHi:'#dfeaf2', { size:7, life:52 });
      spawnBurst(322, 154, ['#cfe8f4','#bfe0ec','#fff2bc'], 12, { spd:1.5, up:0.5 });
      addShake(1.6);
      unlock('FIRST_CRAFT', '🛠 첫 웨이퍼 제작!', 0);
      if (state.hour >= 26){ autoCollapse(); return; }
    }
    state.pmove=false; state.pwalk=0; state.prompt=null;
    return;
  }
  let vx=0, vy=0;
  if (state.fadeDir === 0){
    if (isDown('arrowup','w'))    { vy=-1; state.pdir='up'; }
    if (isDown('arrowdown','s'))  { vy= 1; state.pdir='down'; }
    if (isDown('arrowleft','a'))  { vx=-1; state.pdir='left'; }
    if (isDown('arrowright','d')) { vx= 1; state.pdir='right'; }
  }
  state.pmove = !!(vx||vy);
  if (state.pmove){
    if (vx&&vy){ vx*=0.707; vy*=0.707; }
    const sp=1.3;
    let nx=state.sx+vx*sp, ny=state.sy+vy*sp;
    nx=Math.max(SMOCK_LEFT, Math.min(SMOCK_RIGHT, nx));
    ny=Math.max(SMOCK_TOP, Math.min(SMOCK_BOT, ny));
    // collide with the changing bench/lockers and the craft box
    for (const s of SMOCK_STATIONS){
      if (s.id !== 'changer' && s.id !== 'craftbox') continue;
      const sx0=s.x, sx1=s.x+s.w, sy0=s.y, sy1=s.y+s.h;
      if (nx>sx0-4 && nx<sx1+4 && ny>sy0-2 && ny<sy1+2){
        const tx=state.sx+vx*sp;
        if (!(tx>sx0-4 && tx<sx1+4 && state.sy>sy0-2 && state.sy<sy1+2)){ nx=tx; ny=state.sy; }
        else { const ty=state.sy+vy*sp;
          if (!(state.sx>sx0-4 && state.sx<sx1+4 && ty>sy0-2 && ty<sy1+2)){ nx=state.sx; ny=ty; }
          else { nx=state.sx; ny=state.sy; } }
      }
    }
    state.sx=nx; state.sy=ny;
    state.pwalkAcc+=sp;
    if (state.pwalkAcc>5){ state.pwalkAcc=0; state.pwalk=(state.pwalk+1)%4; }
  } else state.pwalk=0;

  // dynamic changer prompt + locked-door hints
  const ns = nearestSmockStation();
  if (ns && ns.id === 'changer'){
    state.prompt = { ...ns, prompt: state.smockOn ? 'smock 벗기' : 'smock 입기' };
  } else if (ns && ns.id === 'fabdoor' && !state.smockOn){
    state.prompt = { ...ns, prompt: '팹 (smock 필요)' };
  } else if (ns && ns.id === 'officedoor' && state.smockOn){
    state.prompt = { ...ns, prompt: '사무실 (smock 탈의)' };
  } else {
    state.prompt = ns;
  }
}
