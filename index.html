function nearestBreakStation(){
  let best=null,bd=999;
  for (const s of BREAK_STATIONS){
    const d=Math.hypot(state.bx-s.doorX, state.by-s.doorY);
    if (d<22 && d<bd){ bd=d; best=s; }
  }
  return best;
}
function handleBreakKey(k){
  if (k===' '||k==='e') breakInteract();
  if (k==='r') rest();
}
function breakInteract(){
  const s=nearestBreakStation();
  if(!s) return;
  if (s.id==='sofa') takeBreak();
  else if (s.id==='vending') vendingBuy();
  else if (s.id==='roofdoor') switchScene('roof');
  else if (s.id==='officedoor') switchScene('office');
  else if (s.id==='npc') talkNpc();
}
function takeBreak(){
  if (state.power >= state.maxPower){ showMsg('Power가 이미 가득함'); return; }
  state.power = Math.min(state.maxPower, state.power + 45);
  state.temp += (22 - state.temp) * 0.5;     // a breather steadies the line too
  state.hour += 2;                            // costs 2 game-hours (no new day)
  speak('self', '☕ 재충전 — Power +45 (2시간)', 130);
  spawnFloater(state.bx, state.by-28, '+45 ⚡', C.grnHi, { size: 7, life: 48 });
  questEvent('break');
  if (state.hour >= 26){ autoCollapse(); }
}
function vendingBuy(){
  const cost = 40;
  if (state.power >= state.maxPower){ showMsg('Power가 이미 가득함'); return; }
  if (state.krw < cost){ showMsg('KRW 부족 (40 필요)'); return; }
  state.krw -= cost;
  state.power = Math.min(state.maxPower, state.power + 30);
  speak('self', '🥤 에너지드링크 — Power +30', 120);
  spawnFloater(state.bx, state.by-28, '+30 ⚡', C.grnHi, { size: 7, life: 46 });
}
function roomMove(get, set, bounds, blockers){
  let vx=0,vy=0;
  if (state.fadeDir===0){
    if (isDown('arrowup','w')){vy=-1;state.pdir='up';}
    if (isDown('arrowdown','s')){vy=1;state.pdir='down';}
    if (isDown('arrowleft','a')){vx=-1;state.pdir='left';}
    if (isDown('arrowright','d')){vx=1;state.pdir='right';}
  }
  state.pmove=!!(vx||vy);
  if (state.pmove){
    if(vx&&vy){vx*=0.707;vy*=0.707;}
    const sp=1.3, p=get();
    let nx=Math.max(bounds[0],Math.min(bounds[1],p.x+vx*sp));
    let ny=Math.max(bounds[2],Math.min(bounds[3],p.y+vy*sp));
    for (const b of blockers){
      const inB=(X,Y)=>X>b.x-4&&X<b.x+b.w+4&&Y>b.y-2&&Y<b.y+b.h+2;
      if (inB(nx,ny)){
        if (!inB(nx,p.y)) ny=p.y;
        else if (!inB(p.x,ny)) nx=p.x;
        else { nx=p.x; ny=p.y; }
      }
    }
    set(nx,ny);
    state.pwalkAcc+=sp; if(state.pwalkAcc>5){state.pwalkAcc=0;state.pwalk=(state.pwalk+1)%4;}
  } else state.pwalk=0;
}
function updateBreak(){

    [BREAK_LEFT,BREAK_RIGHT,BREAK_TOP,BREAK_BOT], [BREAK_STATIONS[0]]);
  state.prompt = nearestBreakStation();

function nearestRndStation(){
  let best=null,bd=999;
  for (const s of RND_STATIONS){
    const d=Math.hypot(state.rx-s.doorX, state.ry-s.doorY);
    if (d<22 && d<bd){ bd=d; best=s; }
  }
  return best;
}
function handleRndKey(k){
  if (state.rndMenuOpen){
    if (k==='escape'||k==='b') state.rndMenuOpen=false;
    else if (k==='arrowup'||k==='w') rndMove(-1);
    else if (k==='arrowdown'||k==='s') rndMove(1);
    else if (k==='enter'||k===' ') rndStart();
    return;
  }
  if (k===' '||k==='e') rndInteract();
  if (k==='r') rest();
}
function rndInteract(){
  const s=nearestRndStation();
  if(!s) return;
  if (s.id==='terminal'){ state.rndMenuOpen=true; state.rndCursor=0; }
  else if (s.id==='officedoor') switchScene('office');
  else if (s.id==='npc') talkNpc();
}
function rndMove(d){
  let n=state.rndCursor+d;
  if (n<0) n=RND_PROJECTS.length-1;
  if (n>=RND_PROJECTS.length) n=0;
  state.rndCursor=n;
}
function rndStart(){
  const p=RND_PROJECTS[state.rndCursor];
  if (state.research.done[p.id]){ speak('self','이미 연구 완료', 70); return; }
  if (state.research.active){ speak('self','다른 연구 진행 중', 90); return; }
  if (state.silicon < p.cost){ speak('self','Si 부족 ('+p.cost+' 필요)', 90); return; }
  state.silicon -= p.cost;
  state.research.active = { id:p.id, daysLeft:p.days };
  speak('self', '🔬 ' + p.name + ' 연구 시작 (' + p.days + '일)', 150);
  state.rndMenuOpen = false;
}

  if (!state.rndMenuOpen){

function handleRoofKey(k){

// time-of-day sky color (top + bottom), interpolated across keyframes
const ROOF_SKY = [
  { h:5,  top:[20,26,54],   bot:[64,60,96]   },  // pre-dawn
  { h:6,  top:[58,74,128],  bot:[238,158,112] },  // dawn
  { h:8,  top:[120,176,224],bot:[202,230,240] },  // morning
  { h:12, top:[92,172,232], bot:[200,236,248] },  // noon
  { h:16, top:[120,176,222],bot:[206,226,238] },  // afternoon
  { h:18, top:[98,98,162],  bot:[244,162,96]  },  // sunset
  { h:20, top:[46,42,94],   bot:[172,92,128]  },  // dusk
  { h:22, top:[16,20,48],   bot:[42,44,84]    },  // night
  { h:26, top:[8,10,28],    bot:[20,24,54]    },  // deep night
];
function roofSky(){
  const h=state.hour, k=ROOF_SKY;
  const lc=(a,b,t)=>[0,1,2].map(i=>Math.round(a[i]+(b[i]-a[i])*t));
  if (h<=k[0].h) return {top:k[0].top, bot:k[0].bot};
  if (h>=k[k.length-1].h) return {top:k[k.length-1].top, bot:k[k.length-1].bot};
  for (let i=0;i<k.length-1;i++){
    if (h>=k[i].h && h<=k[i+1].h){
      const t=(h-k[i].h)/(k[i+1].h-k[i].h);
      return { top:lc(k[i].top,k[i+1].top,t), bot:lc(k[i].bot,k[i+1].bot,t) };
    }
  }
  return {top:k[0].top, bot:k[0].bot};
}
function dimHex(hex, f){
  const n=parseInt(hex.slice(1),16);
  return 'rgb('+Math.round(((n>>16)&255)*f)+','+Math.round(((n>>8)&255)*f)+','+Math.round((n&255)*f)+')';
}
function roofStarAlpha(){
  const h=state.hour;
  if (h>=20 || h<5) return 1;
  if (h>=18 && h<20) return (h-18)/2;
  if (h>=5 && h<7) return (7-h)/2;
  return 0;
}

//  SILICON MINE (광산) — mine ore at the vein, craft wafers at the box
// ============================================================
function nearestMineStation(){
  let best=null,bd=999;
  for (const s of MINE_STATIONS){
    const d=Math.hypot(state.mx2-s.doorX, state.my2-s.doorY);
    if (d<26 && d<bd){ bd=d; best=s; }
  }
  return best;
}
function handleMineKey(k){
  if (state.mining>0 || state.crafting>0) return;   // busy
  if (k===' '||k==='e') mineInteract();
  if (k==='r') rest();
}
function mineInteract(){
  const s=nearestMineStation(); if(!s) return;
  if (s.id==='vein') startMining();
  else if (s.id==='gardendoor') switchScene('garden');
}
function startMining(){
  if (state.oreVein < 1){ speak('self','광맥이 고갈됨 — 잠시 후 회복', 130); return; }
  if (state.power < 3){ showMsg('Power 부족! R로 휴식'); return; }
  state.mining = 26;
  state.pdir = 'up';
}
function startCraft(){
  if (state.carry){ showMsg('손이 차 있음 — Q로 버리기'); return; }
  if (state.inventory.ore < ORE_PER_WAFER){ showMsg('실리콘 ' + ORE_PER_WAFER + '개 필요 (보유 ' + state.inventory.ore + ')'); return; }
  if (state.power < 4){ showMsg('Power 부족! R로 휴식'); return; }
  state.crafting = 46;
  state.pdir = 'up';
}
function updateMine(){
  // mining swing
  if (state.mining > 0){
    state.mining--;
    if (state.mining === 12){                       // the strike connects
      const rich = Math.random() < 0.12;
      const gain = (1 + (Math.random()<0.35?1:0)) + (rich?2:0);
      state.inventory.ore += gain;
      state.oreVein = Math.max(0, state.oreVein - gain);
      state.power = Math.max(0, state.power - 3);
      state.hour += 0.25;
      spawnFloater(112, 172, '+' + gain + ' 실리콘' + (rich?' 💎':''), rich?'#7ce0f0':'#dfeaf2', { size: rich?8:7, life:46 });
      spawnBurst(112, 176, rich?['#7ce0f0','#bfe0ec','#ffffff']:['#9a8e7e','#b8ac98','#d8d0c0'], rich?15:9, { spd:1.5, up:0.4 });
      addShake(rich?2.6:1.3);
      if (rich) unlock('RICH_VEIN', '💎 노다지! 풍부한 광맥', 0);
      // 도감: log silicon + a chance at a rarer specimen
      discoverMineral('silicon', gain);
      if (Math.random() < 0.4){
        const mid = weightedMineral();
        discoverMineral(mid);
        const mm = MINERALS.find(x=>x.id===mid);
        const bonus = mm && (mm.rarity==='희귀'||mm.rarity==='전설') ? 20 : 5;
        state.krw += bonus;
        spawnFloater(112, 160, (mm?mm.name:'표본') + ' +' + bonus + '₩', mm?mm.col:'#cfe8f4', { size:6, life:44 });
      }
      if (state.hour >= 26){ autoCollapse(); return; }
    }
  }
  if (state.mining>0){ state.pmove=false; state.pwalk=0; state.prompt=null; return; }
  // slow vein regeneration
  if (state.oreVein < 100) state.oreVein = Math.min(100, state.oreVein + 0.02);
  roomMove(()=>({x:state.mx2,y:state.my2}), (x,y)=>{state.mx2=x;state.my2=y;},
    [MINE_LEFT,MINE_RIGHT,MINE_TOP,MINE_BOT], [MINE_STATIONS[0]]);
  state.prompt = nearestMineStation();
}

  // dark rock cavern
  R(0,0,W,H,'#241e26');
  R(0,22,W,80,'#332b34'); R(0,22,W,2,'#42384a'); R(0,100,W,2,'#1c1620');
  // rough rock texture on the walls
  for (let i=0;i<60;i++){ const x=(i*97)%W, y=24+(i*53)%72; R(x,y,3,2,'#2c252e'); P(x+1,y+1,'#3c3340'); }
  // support beams
  for (const bx of [120, 250, 380]){ R(bx-3,22,6,80,'#5a4632'); R(bx-3,22,6,2,'#6e5742'); }
  R(0,96,W,6,'#4a3a28');
  // ceiling lamps

function nearestLibStation(){
  let best=null,bd=999;
  for (const s of LIB_STATIONS){
    const d=Math.hypot(state.lbx-s.doorX, state.lby-s.doorY);
    if (d<24 && d<bd){ bd=d; best=s; }
  }
  return best;
}

function frame(){
  update();
  tickJuice();

  // clear full device buffer (so shake gaps show dark, not stale frame)
  ctx.setTransform(1,0,0,1,0,0);
  ctx.fillStyle = '#0a0810';
  ctx.fillRect(0,0,cvs.width,cvs.height);
  // base 2x scale + screen-shake offset
  let shx=0, shy=0;
  if (state.shake > 0){ shx=(Math.random()*2-1)*state.shake; shy=(Math.random()*2-1)*state.shake; }
  ctx.setTransform(2,0,0,2, shx*2, shy*2);

  if (state.scene === 'office') renderOffice();
  else if (state.scene === 'smock') renderSmock();
  else if (state.scene === 'break') renderBreak();
  else if (state.scene === 'rnd') renderRnd();
  else if (state.scene === 'roof') renderRoof();
  else if (state.scene === 'hall') renderHall();
  else if (state.scene === 'lobby') renderLobby();
  else if (state.scene === 'garden') renderGarden();
  else if (state.scene === 'mine') renderMine();
  else if (state.scene === 'library') renderLibrary();
  else renderFab();

  // world-space juice (over the scene, under modals/fade)
  drawParticles();
  drawFloaters();

  // scene fade overlay (covers everything, both scenes)
  if (state.fade > 0){
    ctx.fillStyle = 'rgba(10,8,16,' + state.fade + ')';
    ctx.fillRect(0,0,W,H);
  }

  // quest log overlay
  drawQuestLog();
  // 도감 overlay
  drawCompendium();
  // automation dashboard
  drawDashboard();
  drawContracts();
  drawTech();
  // NPC dialogue box
  drawNpcDialog();

  // ending report card (above everything)
  drawEnding();

  // language menu (topmost)
  drawLangMenu();

  requestAnimationFrame(frame);
}

  state.lang = l;
  state.langSel = (l === 'en') ? 1 : 0;
  try { localStorage.setItem('cv_lang', l); } catch(e){}
  state.langMenu = false;
  TR_CACHE.clear();
  updateHintBar();
}
function openLangMenu(){
  state.langSel = (state.lang === 'en') ? 1 : 0;
  state.langMenu = true;
}
function handleLangMenuKey(k){
  if (k === 'arrowup' || k === 'w' || k === 'arrowdown' || k === 's' ||
      k === 'arrowleft' || k === 'a' || k === 'arrowright' || k === 'd'){
    state.langSel = state.langSel ? 0 : 1;
  } else if (k === '1'){ setLang('ko'); }
  else if (k === '2'){ setLang('en'); }
  else if (k === 'enter' || k === ' ' || k === 'e'){ setLang(state.langSel ? 'en' : 'ko'); }
  else if (k === 'escape' && (state.lang === 'ko' || state.lang === 'en')){ state.langMenu = false; }
}
function langMenuClick(lx, ly){
  // two option rows
  const ow = 150, ox = (W-ow)/2;
  const koY = 120, enY = 154, oh = 26;
  if (lx>=ox && lx<=ox+ow){
    if (ly>=koY && ly<=koY+oh){ setLang('ko'); return; }
    if (ly>=enY && ly<=enY+oh){ setLang('en'); return; }
  }
}
function drawLangMenu(){
  if (!state.langMenu) return;
  ctx.fillStyle='rgba(8,8,16,0.92)'; ctx.fillRect(0,0,W,H);
  const pw=240, ph=170, px=(W-pw)/2, py=(H-ph)/2;
  R(px-3,py-3,pw+6,ph+6,'#3a5680');
  R(px,py,pw,ph,'#10141f'); R(px,py,pw,2,'#3a5680'); R(px,py+ph-2,pw,2,'#1a2438');
  txt('LANGUAGE', W/2, py+26, 9, '#cfe0f4','center');
  txt('언어 선택', W/2, py+42, 7, '#7fa8d8','center');
  const ow=150, ox=(W-ow)/2;
  const opts=[['한국어 (Korean)', 0, 120], ['English', 1, 154]];
  for (const [label, idx, oy] of opts){
    const on = state.langSel === idx;
    R(ox,oy,ow,26, on?'#2a64c0':'#202838');
    R(ox,oy,ow,1, on?'#5a90e0':'#2a3548');
    if (on){ R(ox,oy,3,26,'#7fc0ff'); }
    txt(label, W/2, oy+17, 7, on?'#ffffff':'#9ab0cc','center');
  }
  txt('↑↓ + Enter  ·  클릭 / Click', W/2, py+ph-14, 5, '#6a7a96','center');
}

loadLang();
updateHintBar();
newQuest();
initNpcQuests();
seedContracts();
rollWeather();
setTimeout(() => {
  speak('npc', '오늘도 좋은 수율을!', 220);
}, 600);
setTimeout(() => {
  showMsg('Tip: 각 장소의 NPC에게 말 걸고 퀘스트 받기 · L = 퀘스트 창', 240);
}, 2200);
setTimeout(() => {
  showMsg('G: 언어 / Language', 200);
}, 4600);

frame();
</script>
