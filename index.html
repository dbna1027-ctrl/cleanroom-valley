<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>Cleanroom Valley — FAB-4</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
<style>
  html, body {
    margin: 0; padding: 0;
    background: #14101a;
    min-height: 100%;
    font-family: 'Press Start 2P', monospace;
    color: #f6e9c8;
    overflow: hidden;
  }
  body {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; gap: 12px;
  }
  .stage {
    width: min(96vw, calc(86vh * 1.7778));
    aspect-ratio: 16/9;
    background: #0a0810;
    box-shadow:
      0 0 0 4px #2a2236,
      0 0 0 8px #1a1422,
      0 20px 60px rgba(0,0,0,.6);
    position: relative;
    image-rendering: pixelated;
  }
  canvas {
    display: block;
    width: 100%; height: 100%;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  .hint {
    font-size: 9px;
    color: #c8a878;
    text-align: center;
    line-height: 1.6;
    max-width: min(96vw, 880px);
    padding: 0 8px;
  }
  .hint b { color: #f4d04c; }
  .toast {
    position: absolute;
    inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .toast.show .panel {
    transform: scale(1);
    opacity: 1;
  }
  .panel {
    background: #3a2818;
    border: 3px solid #f4d04c;
    box-shadow: 0 0 0 3px #1a1208, 0 8px 0 0 rgba(0,0,0,.4);
    padding: 16px 24px;
    color: #fff2c8;
    font-size: 14px;
    text-align: center;
    transform: scale(0.9);
    opacity: 0;
    transition: all 0.3s;
    image-rendering: pixelated;
  }
  .panel small {
    display: block;
    margin-top: 10px;
    font-size: 8px;
    color: #c8a878;
  }
</style>
</head>
<body>

<div class="stage" id="stage">
  <canvas id="game" width="960" height="540"></canvas>
  <div class="toast" id="toast"><div class="panel" id="toast-panel"></div></div>
</div>
<div class="hint">
  <b>이동</b> 방향키/WASD &nbsp;·&nbsp; <b>상호작용</b> Space/E &nbsp;·&nbsp; <b>휴식</b> R &nbsp;·&nbsp; <b>버리기</b> Q &nbsp;·&nbsp; <b>상점</b> B &nbsp;·&nbsp; <b>인벤토리</b> 1~8 &nbsp;·&nbsp; <b>목표</b> Si 100개
</div>

<script>
// ============================================================
//  CLEANROOM VALLEY — Stardew-style semiconductor fab
//  Built on the FAB-4 design pack (warm pastel pixel palette)
// ============================================================

const cvs = document.getElementById('game');
const ctx = cvs.getContext('2d');
ctx.imageSmoothingEnabled = false;
// Internal canvas is 960x540 but we draw in 480x270 logical coords.
// The 2x scale keeps pixel art crisp while giving text 2x more pixels per glyph.
ctx.scale(2, 2);

const W = 480, H = 270;

// --- Palette (from FAB-4 shared/lib.js) -----------------------
const C = {
  outline:'#2a1a2e', black:'#1a1208',
  // suit
  suit:'#f4ecd4', suitHi:'#fffbed', suitSh:'#c8bea0',
  // visor
  visor:'#1a2c48', visorMid:'#3a6088', visorHi:'#6a9cc0',
  // gloves
  glove:'#3878b0', gloveSh:'#1c4878', gloveHi:'#78a8d8',
  // boots
  boot:'#2a2436', bootHi:'#4a4458',
  // badge yellow
  badge:'#f4d04c',
  // floor
  fl0:'#dcdee6', fl1:'#c8cad4', fl2:'#bec0cc', fl3:'#a8aab6', fl4:'#8a8c9a', flGrid:'#9da0ac',
  // wall
  wall:'#efe9d6', wallSh:'#bdb39a', wallHi:'#d8d0b8', wallDk:'#a89980', wallDk2:'#8a7858',
  // litho yellow
  yel:'#f0c440', yelHi:'#fce078', yelSh:'#a87810', yelDk:'#b88828',
  // etch purple
  pur:'#6a5878', purHi:'#8a78a0', purSh:'#4c3c5c',
  plasma:'#d870b0', plasmaHi:'#f4a8d8', plasmaCore:'#fff2c8',
  // FOUP orange
  org:'#e8961c', orgHi:'#f4b048', orgSh:'#a86010',
  // panel cool
  panelDk:'#3a4860', panelMid:'#5a708c', screen:'#2a4860',
  laser:'#a8e8ff', laserHi:'#dcf6ff', laserCore:'#ffffff',
  // wood UI
  wood:'#3a2818', woodHi:'#6c4828', woodDk:'#1a1208',
  woodMid:'#5a3c20', woodMidHi:'#8a5c30', woodLite:'#a87838',
  parchment:'#fff2c8', parchHi:'#fff8d8', parchMid:'#c8a878',
  // green
  grn:'#3a8c5c', grnHi:'#74c490', grnXHi:'#a8f0c0',
  // red
  red:'#c44830', redHi:'#ff8868',
  // silicon
  si:'#787890', siMid:'#a8a8c0', siHi:'#c8c8e0', siXHi:'#dcdcf8',
  // crate brown
  crate:'#a87838', crateHi:'#c49858', crateSh:'#7a5828',
  // bg
  void:'#14101a', voidLite:'#2a2236',
};

// pixel rect helper
function R(x,y,w,h,col){ ctx.fillStyle = col; ctx.fillRect(x|0,y|0,w|0,h|0); }
function P(x,y,col){ ctx.fillStyle = col; ctx.fillRect(x|0,y|0,1,1); }
function txt(s, x, y, size, col, anchor){
  ctx.fillStyle = col;
  ctx.font = size + "px 'Press Start 2P', monospace";
  ctx.textAlign = anchor || 'left';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText(s, x, y);
}

// ============================================================
//  WORLD GEOMETRY  (pixel coords, 480x270 canvas)
// ============================================================
//
//   Top bar (HUD)         y =   0 .. 22
//   Back wall band        y =  22 .. 78
//   Floor (play area)     y =  78 .. 238
//   Inventory bar         y = 238 .. 270
//
// Play bounds for player FEET:
const FLOOR_TOP = 92;    // can walk up close to the back wall (behind equipment)
const FLOOR_BOT = 232;
const FLOOR_LEFT = 8;
const FLOOR_RIGHT = 472;

// Stations (interaction triggers). Player can interact when within range.
const STATIONS = [
  { id:'foup',   x:32,  y:96,  w:78, h:114, prompt:'웨이퍼 꺼내기',  doorX:71,  doorY:218 },
  { id:'shop',   x:130, y:198, w:24, h:32,  prompt:'FAB-MART 열기', doorX:142, doorY:236 },
  { id:'litho',  x:174, y:104, w:116,h:98,  prompt:'노광 시작',     doorX:232, doorY:212 },
  { id:'etcher', x:352, y:116, w:92, h:78,  prompt:'식각 시작',     doorX:398, doorY:202 },
  { id:'crate',  x:432, y:200, w:32, h:24,  prompt:'출하',         doorX:448, doorY:228 },
  { id:'npc',    x:312, y:188, w:14, h:26,  prompt:'대화',          doorX:319, doorY:222 },
];

// ============================================================
//  GAME STATE
// ============================================================

const state = {
  // player
  px: 232, py: 222,       // foot position
  pdir: 'down',           // 'down' | 'up' | 'left' | 'right'
  pmove: false,
  pwalk: 0,               // 0..3 walk cycle frame
  pwalkAcc: 0,
  // carrying
  carry: null,            // null | 'raw' | 'exposed' | 'etched'
  carryQ: 0,              // 0=normal, 1=good, 2=perfect
  // resources
  silicon: 0,
  power: 100,
  maxPower: 100,
  temp: 22.1,
  day: 1,
  // machines
  lithoBusy: 0,    // remaining frames
  etchBusy: 0,
  lithoOut: false, // true means a wafer is sitting in the litho ready
  lithoOutQ: 0,    // quality of that ready wafer
  etchOut: false,
  etchOutQ: 0,
  // minigame
  miniGame: null,         // { type, pos:0..1, dir:±1, speed, result, lockedAt }
  // combo & stats
  combo: 0,
  comboTimer: 0,          // frames left in combo window
  maxCombo: 0,
  shipTotal: 0,
  perfectTotal: 0,
  scrapTotal: 0,
  // quest
  quest: null,            // { type, target, progress, reward, label }
  questDone: 0,
  perfectQuestCount: 0,
  // achievements
  achv: {},               // id -> true
  achvQ: [],              // queue of { text, until, sub }
  // rush order
  rush: null,
  nextRushAt: 60 * 35,
  // inventory (consumables)
  inventory: {
    photoresist: 5,
    etchant: 5,
    coffee: 1,            // start with one free coffee
    wrench: 0,
    mask: 0,
  },
  // permanent upgrades (purchased from shop)
  upgrades: {
    lithoBoost: 0,        // 0..3, each level: machine -30 frames
    etchBoost: 0,
    battery: 0,           // 0..3, each level: +20% maxPower
    perfect: 0,           // 0..2, each level: +2.5% perfect-zone half-width
  },
  // one-shot boosts armed via inventory items
  boostNext: { perfect: false },
  // shop modal
  shopOpen: false,
  shopCursor: 0,
  shopFlash: 0,           // flash frames after purchase
  // inventory click feedback
  invFlash: { slot: -1, until: 0 },
  // ui
  msg: null,
  speech: null,
  prompt: null,
  // global tick
  t: 0,
  won: false,
};

// Shop items in order — separator placed between consumables and upgrades.
const SHOP_ITEMS = [
  { id:'pr',         name:'Photoresist +5', price:20, kind:'consume', icon:'photoresist' },
  { id:'et',         name:'Etchant +5',     price:20, kind:'consume', icon:'etchant' },
  { id:'coffee',     name:'Coffee',         price:18, kind:'consume', icon:'coffee' },
  { id:'wrench',     name:'Wrench',         price:35, kind:'consume', icon:'wrench' },
  { id:'mask',       name:'Mask (Auto-PERFECT)', price:55, kind:'consume', icon:'mask' },
  { id:'lithoBoost', name:'Litho Speed+',   kind:'upgrade', max:3, prices:[30,60,120], icon:'upLitho' },
  { id:'etchBoost',  name:'Etch Speed+',    kind:'upgrade', max:3, prices:[30,60,120], icon:'upEtch' },
  { id:'battery',    name:'Battery+',       kind:'upgrade', max:3, prices:[40,80,160], icon:'upBattery' },
  { id:'perfect',    name:'PERFECT Zone+',  kind:'upgrade', max:2, prices:[60,150],    icon:'upPerfect' },
];

// ============================================================
//  INPUT
// ============================================================

const keys = {};
window.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  keys[k] = true;
  if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k)) e.preventDefault();

  // Shop modal swallows most input
  if (state.shopOpen){
    if (k === 'b' || k === 'escape') closeShop();
    else if (k === 'arrowup' || k === 'w') shopMove(-1);
    else if (k === 'arrowdown' || k === 's') shopMove(1);
    else if (k === 'enter' || k === ' ') shopBuy();
    return;
  }

  // Minigame swallows Space/E
  if (state.miniGame && !state.miniGame.result){
    if (k === ' ' || k === 'e') resolveMiniGame();
    return;
  }

  // Normal world input
  if (k === ' ' || k === 'e') tryInteract();
  if (k === 'r') rest();
  if (k === 'b') openShop();
  if (k === 'q') discardCarry();
  if (k >= '1' && k <= '8') clickInventory(parseInt(k, 10));
});
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

function isDown(...names){ return names.some(n => keys[n]); }

// ============================================================
//  GAME LOGIC
// ============================================================

function toast(text, ms){
  const t = document.getElementById('toast');
  const p = document.getElementById('toast-panel');
  p.innerHTML = text;
  t.classList.add('show');
  clearTimeout(toast._h);
  toast._h = setTimeout(() => t.classList.remove('show'), ms || 1800);
}

function showMsg(text, frames){
  state.msg = { text, until: state.t + (frames||120) };
}

function speak(who, text, frames){
  state.speech = { who, text, until: state.t + (frames||140) };
}

// pick nearest station within range of player feet
function nearestStation(){
  let best = null, bd = 999;
  for (const s of STATIONS){
    const dx = state.px - s.doorX, dy = state.py - s.doorY;
    const d = Math.hypot(dx, dy);
    if (d < 20 && d < bd){ bd = d; best = s; }
  }
  return best;
}

function tryInteract(){
  if (state.won) return;
  if (state.miniGame) return;
  if (state.shopOpen) return;
  const s = nearestStation();
  if (!s) return;

  if (s.id === 'foup'){
    if (state.carry){ showMsg('이미 들고 있음 — Q로 버리기'); return; }
    state.carry = 'raw';
    state.carryQ = 0;
    speak('self', 'Raw wafer 획득!', 90);
  }
  else if (s.id === 'shop'){
    openShop();
  }
  else if (s.id === 'litho'){
    if (state.lithoBusy > 0){ showMsg('가동 중...'); return; }
    if (state.lithoOut){
      if (state.carry){ showMsg('손 비워야 함 — Q로 버리기'); return; }
      state.carry = 'exposed';
      state.carryQ = state.lithoOutQ;
      state.lithoOut = false;
      const tag = state.carryQ === 2 ? 'PERFECT exposed!' : state.carryQ === 1 ? 'Good exposed!' : 'Exposed';
      speak('self', tag, 90);
      return;
    }
    if (state.carry !== 'raw'){ showMsg('Raw wafer 필요'); return; }
    if (state.power < 8){ showMsg('Power 부족! R로 휴식'); return; }
    if (state.inventory.photoresist <= 0){ showMsg('Photoresist 부족! Shop에서 구매'); return; }
    startMiniGame('litho');
  }
  else if (s.id === 'etcher'){
    if (state.etchBusy > 0){ showMsg('가동 중...'); return; }
    if (state.etchOut){
      if (state.carry){ showMsg('손 비워야 함 — Q로 버리기'); return; }
      state.carry = 'etched';
      state.carryQ = state.etchOutQ;
      state.etchOut = false;
      const tag = state.carryQ === 2 ? 'PERFECT etched!' : state.carryQ === 1 ? 'Good etched!' : 'Etched';
      speak('self', tag, 90);
      return;
    }
    if (state.carry !== 'exposed'){ showMsg('Exposed wafer 필요'); return; }
    if (state.power < 10){ showMsg('Power 부족! R로 휴식'); return; }
    if (state.inventory.etchant <= 0){ showMsg('Etchant 부족! Shop에서 구매'); return; }
    startMiniGame('etcher');
  }
  else if (s.id === 'crate'){
    if (state.carry !== 'etched'){ showMsg('완성품(etched) 필요'); return; }
    const reward = computeShipReward(state.carryQ);
    state.silicon += reward;
    onShipped(state.carryQ);
    state.carry = null;
    state.carryQ = 0;
    speak('self', '+' + reward + ' Si !!', 110);
    state.temp += (Math.random()-0.5) * 0.6;
    state.temp = Math.max(20, Math.min(25, state.temp));
    if (state.silicon >= 100 && !state.won){
      state.won = true;
      setTimeout(() => {
        const stats = '<small>Day ' + state.day + ' / Max combo x' + state.maxCombo +
                      '<br>Perfect ' + state.perfectTotal + ' / Scrap ' + state.scrapTotal +
                      '<br>Quest 완료 ' + state.questDone + '회' +
                      '<br>R 키로 새 일 시작</small>';
        toast('🎉 FAB COMPLETE! 🎉<br>Yield: 98%<br>' + stats, 99999);
      }, 400);
    }
  }
  else if (s.id === 'npc'){
    if (state.quest){
      const q = state.quest;
      speak('npc', q.label + ' ' + q.progress + '/' + q.target, 160);
    } else {
      const tips = [
        '오늘 수율 좋네요!',
        '캘리브레이션은 정중앙!',
        'B 키로 FAB-MART!',
      ];
      speak('npc', tips[Math.floor(state.t/120)%tips.length], 140);
    }
  }
}

function discardCarry(){
  if (state.miniGame || state.shopOpen || state.won) return;
  if (!state.carry){ showMsg('버릴 게 없음'); return; }
  const c = state.carry;
  const q = state.carryQ;
  state.carry = null;
  state.carryQ = 0;
  if (c === 'raw'){
    speak('self', 'Raw wafer 버림', 80);
  } else if (c === 'exposed'){
    const qName = ['Normal','Good','PERFECT'][q];
    speak('self', 'Exposed(' + qName + ') 버림 😢', 110);
    state.scrapTotal++;
  } else if (c === 'etched'){
    const qName = ['Normal','Good','PERFECT'][q];
    speak('self', 'Etched(' + qName + ') 버림 😭', 130);
    state.scrapTotal++;
  }
}

function rest(){
  if (state.power >= state.maxPower && !state.won &&
      state.inventory.photoresist >= 5 && state.inventory.etchant >= 5){
    showMsg('이미 최대 상태');
    return;
  }
  state.power = state.maxPower;
  state.day += 1;
  state.temp = 22.0 + Math.random() * 0.4;
  // refill basic consumables up to 5
  if (state.inventory.photoresist < 5) state.inventory.photoresist = 5;
  if (state.inventory.etchant < 5) state.inventory.etchant = 5;
  if (state.won){
    // reset stats but KEEP upgrades & inventory (player earned them)
    state.won = false;
    state.silicon = 0;
    state.shipTotal = 0;
    state.perfectTotal = 0;
    state.maxCombo = 0;
    state.questDone = 0;
    state.achv = {};
    document.getElementById('toast').classList.remove('show');
  }
  if (state.day === 3) unlock('DAY_3', '☀️ Day 3 도달!', 15);
  if (state.day === 7) unlock('DAY_7', '☀️ Day 7 도달!', 30);
  speak('self', 'Day ' + state.day + ' — 보급 완료!', 100);
}

// ============================================================
//  SHOP & INVENTORY  — opening, buying, using consumables
// ============================================================

function openShop(){
  if (state.miniGame) return;
  state.shopOpen = true;
  state.shopCursor = 0;
}
function closeShop(){
  state.shopOpen = false;
  state.shopFlash = 0;
}
function shopMove(dir){
  let n = state.shopCursor + dir;
  if (n < 0) n = SHOP_ITEMS.length - 1;
  if (n >= SHOP_ITEMS.length) n = 0;
  state.shopCursor = n;
}
function shopBuy(){
  const item = SHOP_ITEMS[state.shopCursor];
  if (item.kind === 'consume'){
    if (state.silicon < item.price){ speak('self','Si 부족!', 70); return; }
    state.silicon -= item.price;
    if (item.id === 'pr')      state.inventory.photoresist += 5;
    else if (item.id === 'et') state.inventory.etchant += 5;
    else if (item.id === 'coffee') state.inventory.coffee += 1;
    else if (item.id === 'wrench') state.inventory.wrench += 1;
    else if (item.id === 'mask')   state.inventory.mask += 1;
    state.shopFlash = 24;
    speak('self', '구매 ✓', 60);
    unlock('FIRST_BUY', '🛒 첫 구매!', 0);
  } else {
    const lv = state.upgrades[item.id];
    if (lv >= item.max){ speak('self','MAX 도달!', 70); return; }
    const price = item.prices[lv];
    if (state.silicon < price){ speak('self','Si 부족!', 70); return; }
    state.silicon -= price;
    state.upgrades[item.id]++;
    applyUpgrade(item.id);
    state.shopFlash = 36;
    speak('self', item.name + ' Lv.' + (lv+1) + ' !', 120);
    unlock('FIRST_UPGRADE', '⚡ 첫 업그레이드!', 0);
    if (state.upgrades.battery === 3) unlock('MAX_BATTERY', '🔋 Battery MAX!', 50);
    if (state.upgrades.lithoBoost === 3 && state.upgrades.etchBoost === 3)
      unlock('MAX_SPEED', '⚡ 풀스피드!', 80);
  }
}
function applyUpgrade(id){
  if (id === 'battery'){
    state.maxPower = 100 + 20 * state.upgrades.battery;
    state.power = state.maxPower;
  }
}

function useInventoryItem(slot){
  if (state.miniGame || state.shopOpen || state.won) return;
  if (slot === 4){
    if (state.inventory.coffee <= 0){ showMsg('☕ Coffee 없음 — Shop에서 구매'); return; }
    state.inventory.coffee--;
    state.power = Math.min(state.maxPower, state.power + 40);
    speak('self', '☕ +40 Power', 80);
  } else if (slot === 5){
    if (state.inventory.wrench <= 0){ showMsg('🔧 Wrench 없음 — Shop에서 구매'); return; }
    if (state.lithoBusy === 0 && state.etchBusy === 0){
      showMsg('가동 중인 장비 없음'); return;
    }
    state.inventory.wrench--;
    if (state.lithoBusy > 0) state.lithoBusy = 1;
    if (state.etchBusy > 0) state.etchBusy = 1;
    speak('self', '🔧 즉시 완료!', 80);
  } else if (slot === 6){
    if (state.inventory.mask <= 0){ showMsg('🎭 Mask 없음 — Shop에서 구매'); return; }
    if (state.boostNext.perfect){ showMsg('이미 활성 중'); return; }
    state.inventory.mask--;
    state.boostNext.perfect = true;
    speak('self', '🎭 다음 캘리브 PERFECT 보장!', 110);
  }
}

// All slot clicks (number keys 1-8) — slots 1-3 show info, 4-6 use items, 7-8 are empty
function clickInventory(slot){
  if (state.shopOpen || state.won) return;
  if (state.miniGame && !state.miniGame.result) return;
  // visual flash always fires (gives clear keypress feedback)
  state.invFlash = { slot: slot - 1, until: state.t + 14 };

  if (slot === 1){
    if (!state.carry){ showMsg('웨이퍼 없음 — FOUP에서 꺼내기'); return; }
    const qName = ['Normal','Good','PERFECT'][state.carryQ];
    const cName = state.carry === 'raw' ? 'Raw'
                : state.carry === 'exposed' ? 'Exposed'
                : 'Etched';
    showMsg('현재: ' + cName + ' wafer  [Q: ' + qName + ']');
  } else if (slot === 2){
    showMsg('Photoresist × ' + state.inventory.photoresist + '  — Litho 자동 소모');
  } else if (slot === 3){
    showMsg('Etchant × ' + state.inventory.etchant + '  — Etch 자동 소모');
  } else if (slot === 4 || slot === 5 || slot === 6){
    useInventoryItem(slot);
  } else if (slot === 7 || slot === 8){
    showMsg('빈 슬롯 — 차후 해금 예정');
  }
}

function startMiniGame(type){
  state.miniGame = { type, pos: 0, dir: 1, speed: 0.016, result: null, lockedAt: 0 };
}

function resolveMiniGame(){
  const m = state.miniGame;
  if (!m || m.result) return;

  // Mask boost: force perfect result regardless of timing
  let result;
  if (state.boostNext.perfect){
    result = 'perfect';
    state.boostNext.perfect = false;
  } else {
    const p = m.pos;
    // Wider PERFECT zone if upgraded (+2.5% half-width per level, levels 0..2)
    const pad = 0.025 * state.upgrades.perfect;
    if (p > 0.45 - pad && p < 0.55 + pad) result = 'perfect';
    else if (p > 0.28 && p < 0.72) result = 'good';
    else result = 'bad';
  }
  m.result = result;
  m.lockedAt = state.t;

  const isLitho = m.type === 'litho';
  if (result === 'bad'){
    // scrap the wafer
    state.carry = null;
    state.carryQ = 0;
    state.scrapTotal++;
    state.power = Math.max(0, state.power - 4);
    speak('self', 'SCRAP! 캘리브레이션 실패', 110);
    state.combo = 0;
    state.comboTimer = 0;
  } else {
    // consume the fuel and run the machine
    const inQ = state.carryQ;
    const outQ = result === 'perfect' ? Math.min(2, inQ + 1) : inQ;
    state.carry = null;
    if (isLitho){
      state.inventory.photoresist = Math.max(0, state.inventory.photoresist - 1);
      const baseBusy = 180 - 30 * state.upgrades.lithoBoost;
      state.lithoBusy = Math.max(30, baseBusy);
      state.lithoOutQ = outQ;
      state.power = Math.max(0, state.power - 8);
    } else {
      state.inventory.etchant = Math.max(0, state.inventory.etchant - 1);
      const baseBusy = 180 - 30 * state.upgrades.etchBoost;
      state.etchBusy = Math.max(30, baseBusy);
      state.etchOutQ = outQ;
      state.power = Math.max(0, state.power - 10);
    }
  }
}

function tickMiniGame(){
  const m = state.miniGame;
  if (!m) return;
  if (m.result){
    if (state.t - m.lockedAt > 40) state.miniGame = null;
    return;
  }
  // ramp up speed slowly for skill
  m.pos += m.dir * m.speed;
  if (m.pos >= 1){ m.pos = 1; m.dir = -1; }
  if (m.pos <= 0){ m.pos = 0; m.dir = 1; }
}

function newQuest(){
  const q = QUESTS[state.questDone % QUESTS.length];
  state.quest = { ...q, progress: 0 };
  state.perfectQuestCount = 0;

// ============================================================
//  COMBO & SHIP REWARDS
// ============================================================

function comboMult(){
  if (state.combo >= 5) return 3;
  if (state.combo >= 3) return 2;
  if (state.combo >= 2) return 1.5;
  return 1;
}

function qualityMult(q){
  return [1, 2, 4][q];
}

function computeShipReward(q){
  const base = 10;
  const rushMult = state.rush ? 2 : 1;
  return Math.round(base * qualityMult(q) * comboMult() * rushMult);
}

function addCombo(){
  if (state.comboTimer > 0) state.combo++;
  else state.combo = 1;
  if (state.combo > state.maxCombo) state.maxCombo = state.combo;
  state.comboTimer = 60 * 15; // 15s window
}

function tickCombo(){
  if (state.comboTimer > 0){
    state.comboTimer--;
    if (state.comboTimer === 0){
      if (state.combo > 1) speak('self', 'Combo 끊김!', 70);
      state.combo = 0;
    }
  }
}

function onShipped(q){
  state.shipTotal++;
  if (q === 2) state.perfectTotal++;
  addCombo();

  // rush order tracking
  if (state.rush){
    state.rush.shipped++;
    if (state.rush.shipped >= state.rush.target){
      state.silicon += 30;
      unlock('RUSH_HERO', '🚨 Rush 성공! +30 보너스', 0);
      state.rush = null;
    }
  }

  // quest progress
  if (state.quest){
    const qst = state.quest;
    let advanced = false;
    if (qst.type === 'ship'){
      qst.progress++;
      advanced = true;
    } else if (qst.type === 'perfect' && q === 2){
      qst.progress++;
      advanced = true;
    } else if (qst.type === 'combo'){
      qst.progress = state.maxCombo;
      advanced = true;
    }
    if (advanced && qst.progress >= qst.target){
      state.silicon += qst.reward;
      state.questDone++;
      speak('npc', '퀘스트 완료! +' + qst.reward + ' Si', 180);
      newQuest();
    }
  }

  // achievements
  if (state.shipTotal === 1) unlock('FIRST', '🎯 First Ship! +5', 5);
  if (state.shipTotal === 10) unlock('TEN', '📦 10 Ships! +20', 20);
  if (state.shipTotal === 25) unlock('TWENTY_FIVE', '📦 25 Ships! +50', 50);
  if (state.perfectTotal === 1) unlock('PERFECT_1', '✨ First Perfect! +15', 15);
  if (state.perfectTotal === 5) unlock('PERFECT_5', '✨✨ 5 Perfects! +40', 40);
  if (state.maxCombo === 3 && !state.achv.COMBO_3) unlock('COMBO_3', '🔥 Combo x3! +10', 10);
  if (state.maxCombo === 5 && !state.achv.COMBO_5) unlock('COMBO_5', '🔥🔥 Combo x5! +30', 30);
  if (state.maxCombo === 10 && !state.achv.COMBO_10) unlock('COMBO_10', '🔥🔥🔥 Combo x10! +80', 80);
}

function spawnRush(){
  state.rush = { target: 2, shipped: 0, remaining: 60 * 30, mult: 2 };
  speak('npc', '🚨 RUSH ORDER!', 200);
}

function tickRush(){
  if (state.rush){
    state.rush.remaining--;
    if (state.rush.remaining <= 0){
      speak('self', 'Rush 시간 초과', 100);
      state.rush = null;
    }
  } else {
    state.nextRushAt--;
    if (state.nextRushAt <= 0){
      if (state.shipTotal >= 2 && !state.won){
        spawnRush();
      }
      state.nextRushAt = 60 * (50 + Math.random()*40 | 0);
    }
  }
}

// ============================================================
//  UPDATE  (per frame)
// ============================================================

function update(){
  state.t++;

  // tick auxiliary systems (combo/rush pause during shop, minigame still resolves)
  tickMiniGame();
  if (!state.shopOpen){
    tickCombo();
    tickRush();
  }
  tickAchv();

  // player movement (locked during minigame or shop)
  let vx=0, vy=0;
  if (!state.miniGame && !state.shopOpen){
    if (isDown('arrowup','w'))    { vy = -1; state.pdir='up'; }
    if (isDown('arrowdown','s'))  { vy =  1; state.pdir='down'; }
    if (isDown('arrowleft','a'))  { vx = -1; state.pdir='left'; }
    if (isDown('arrowright','d')) { vx =  1; state.pdir='right'; }
  }
  state.pmove = !!(vx || vy);

  if (state.pmove){
    // diagonal normalize
    if (vx && vy){ vx *= 0.707; vy *= 0.707; }
    const speed = 1.3;
    let nx = state.px + vx * speed;
    let ny = state.py + vy * speed;
    // bounds
    nx = Math.max(FLOOR_LEFT, Math.min(FLOOR_RIGHT, nx));
    ny = Math.max(FLOOR_TOP, Math.min(FLOOR_BOT, ny));
    // collision with stations (feet must stay below their bottoms or to side)
    for (const s of STATIONS){
      if (s.id === 'npc' || s.id === 'crate') continue;
      const sx0=s.x, sx1=s.x+s.w, sy0=s.y, sy1=s.y+s.h;
      // expand a bit for visual collision (player width ~ 8)
      if (nx > sx0 - 4 && nx < sx1 + 4 && ny > sy0 - 2 && ny < sy1 + 2){
        // try axis-separated
        const tryX = state.px + vx*speed;
        if (!(tryX > sx0 - 4 && tryX < sx1 + 4 && state.py > sy0 - 2 && state.py < sy1 + 2)){
          nx = tryX; ny = state.py;
        } else {
          const tryY = state.py + vy*speed;
          if (!(state.px > sx0 - 4 && state.px < sx1 + 4 && tryY > sy0 - 2 && tryY < sy1 + 2)){
            nx = state.px; ny = tryY;
          } else {
            nx = state.px; ny = state.py;
          }
        }
      }
    }
    state.px = nx; state.py = ny;

    // walk anim
    state.pwalkAcc += speed;
    if (state.pwalkAcc > 5){
      state.pwalkAcc = 0;
      state.pwalk = (state.pwalk + 1) % 4;
    }
  } else {
    state.pwalk = 0;
  }

  // machine timers
  if (state.lithoBusy > 0){
    state.lithoBusy--;
    if (state.lithoBusy === 0){
      state.lithoOut = true;
      const tag = state.lithoOutQ === 2 ? 'Litho 완료 (PERFECT!)' : 'Litho 완료';
      speak('self', tag, 80);
    }
  }
  if (state.etchBusy > 0){
    state.etchBusy--;
    if (state.etchBusy === 0){
      state.etchOut = true;
      const tag = state.etchOutQ === 2 ? 'Etch 완료 (PERFECT!)' : 'Etch 완료';
      speak('self', tag, 80);
    }
  }

  // resource drift
  if (state.t % 90 === 0){
    state.temp += (Math.random()-0.5) * 0.2;
    state.temp = Math.max(20.5, Math.min(24.5, state.temp));
  }
  if ((state.lithoBusy > 0 || state.etchBusy > 0) && state.t % 30 === 0){
    state.temp = Math.min(24.5, state.temp + 0.05);
  }

  // expire messages
  if (state.msg && state.t > state.msg.until) state.msg = null;
  if (state.speech && state.t > state.speech.until) state.speech = null;

  // interaction prompt
  const ns = nearestStation();
  state.prompt = ns;
}

function drawEtcher(){
  ctx.save();
  ctx.translate(338, 116);

  // plasma wisps (3 phase-shifted)
  function wisp(ox, phase){
    const tp = (state.t*0.04 + phase) % 1;
    if (tp < 0.05 || tp > 0.95) return;
    const yOff = -tp * 22;
    const a = tp < 0.15 ? tp/0.15 : (tp > 0.85 ? (1-tp)/0.15 : 1);
    ctx.globalAlpha = 0.7 * a;
    R(ox, -2 + yOff, 2, 2, '#d098e0');
    ctx.globalAlpha = 0.7 * a;
    R(ox+2, -4 + yOff, 2, 2, '#e8b0f4');
    ctx.globalAlpha = 0.5 * a;
    R(ox, -6 + yOff, 3, 2, '#f4c8ff');
    ctx.globalAlpha = 1;
  }
  wisp(36, 0);
  wisp(46, 0.33);
  wisp(56, 0.66);

  // dome top
  R(28,-2,36,2,'#3a2c48');
  R(26,0,40,14,'#382c48');
  R(26,0,40,1,'#5a4870');
  R(26,13,40,1,'#1a1024');
  R(26,0,2,14,'#5a4870');
  R(64,0,2,14,'#1a1024');
  // glass
  R(30,2,32,10,'#2a1830');
  R(32,3,28,8,'#7a3878');
  R(32,3,28,2,'#a85098');
  R(32,9,28,2,'#4c1c54');
  // plasma glow inside (pulses with activity)
  const active = state.etchBusy > 0;
  const glow = active ? (0.7 + 0.3 * Math.sin(state.t*0.2)) : 0.5;
  ctx.globalAlpha = glow;
  R(38,5,14,4,C.plasma);
  R(40,6,10,2,C.plasmaHi);
  R(42,6,6,1,C.plasmaCore);
  R(55,5,3,2,C.plasma);
  R(34,7,2,2,C.plasma);
  ctx.globalAlpha = 1;

  // main body
  R(14,14,64,64,C.pur);
  R(14,14,64,2,C.purHi);
  R(14,76,64,2,C.purSh);
  R(14,14,2,64,C.purHi);
  R(76,14,2,64,C.purSh);

  // cooling tubes both sides
  for (const tx of [4,80]){
    R(tx,20,8,50,'#4c3c5c');
    R(tx+1,21,6,48,'#6a5878');
    for (let i=0;i<8;i++){
      R(tx,22+i*6,8,2,'#382c48');

  }

  // door window
  R(22,30,40,30,'#1a1024');
  R(23,31,38,28,'#2a1830');
  R(24,32,36,26,'#3a2c48');
  // chamber wafer inside
  if (state.etchBusy > 0 || state.etchOut){
    const shimmer = (state.t>>2)&1 ? C.plasmaCore : C.plasmaHi;
    R(30,44,24,4,C.si);
    R(30,44,24,1,C.siMid);
    R(32,45,20,2,shimmer);
    ctx.globalAlpha = active ? 0.5 + 0.5*Math.sin(state.t*0.3) : 0;
    R(28,42,28,8,C.plasma);
    ctx.globalAlpha = 1;
  }

  // control strip
  R(22,62,40,12,'#3a2c10');
  R(22,62,40,1,'#6c5430');
  R(23,63,38,10,'#5a4420');
  // LEDs
  R(26,65,3,3,active ? C.red : C.grn);
  if (((state.t>>3)&1) && active) P(27,66,C.redHi);
  R(32,65,3,3,C.badge);
  R(38,65,3,3,C.plasma);
  // mini gauge
  R(46,65,14,3,'#1a1620');
  const eFill = state.etchBusy>0 ? (1 - state.etchBusy/180) * 12 : (state.etchOut?12:8);
  R(47,66, Math.max(1,eFill|0), 1, C.plasmaHi);

// Player — sprite drawn around foot point (px, py). The sprite is
// 14 wide × 26 tall, with the foot at the bottom-middle.
function drawPlayer(){
  const x = (state.px - 7) | 0;
  const y = (state.py - 26) | 0;
  const dir = state.pdir;
  // walk bob — body lifts 1px on certain frames
  const bob = (state.pmove && (state.pwalk === 1 || state.pwalk === 3)) ? -1 : 0;
  // leg stride offsets per dir
  const stride = state.pwalk;

  ctx.save();
  ctx.translate(x, y + bob);

  // HEAD
  if (dir === 'down' || dir === 'right' || dir === 'left'){
    // hood outline + head
    R(2,0,10,2,C.outline);
    R(1,2,12,8,C.suit);
    R(1,2,12,1,C.suitHi);
    R(0,3,1,6,C.outline);
    R(13,3,1,6,C.outline);
    // visor
    if (dir === 'down'){
      R(3,5,8,3,C.visor);
      R(3,5,8,1,C.visorMid);
      P(5,6,C.black);
      P(8,6,C.black);
    } else {
      // side: visor only on the facing side
      const flip = dir === 'left';
      if (!flip){
        R(5,5,7,3,C.visor);
        R(5,5,7,1,C.visorMid);
        P(8,6,C.black);
      } else {
        R(2,5,7,3,C.visor);
        R(2,5,7,1,C.visorMid);
        P(5,6,C.black);
      }
    }
  } else {
    // back of hood (no face)
    R(2,0,10,2,C.outline);
    R(1,2,12,8,C.suit);
    R(1,2,12,1,C.suitHi);
    R(2,8,10,2,C.suitSh);
    R(0,3,1,6,C.outline);
    R(13,3,1,6,C.outline);
  }

  // TORSO
  R(1,10,12,10,C.suit);
  R(1,10,12,1,C.suitHi);
  R(0,11,1,8,C.outline);
  R(13,11,1,8,C.outline);
  R(1,20,12,1,C.suitSh);
  if (dir === 'down'){
    R(6,12,2,2,C.badge);
    R(6,14,2,1,C.yelSh);
  }

  // ARMS / GLOVES
  // For down/up: gloves on both sides
  // For side: gloves only on the front-facing side
  function gloveL(){ R(0,16,2,3,C.gloveSh); R(0,15,2,1,C.glove); }
  function gloveR(){ R(12,16,2,3,C.gloveSh); R(12,15,2,1,C.glove); }
  if (dir === 'down' || dir === 'up'){
    gloveL(); gloveR();
  } else if (dir === 'right'){
    gloveR();
  } else if (dir === 'left'){
    gloveL();
  }

  // CARRY — FOUP held in front
  if (state.carry){
    let cx, cy;
    if (dir === 'down'){ cx = 3; cy = 17; }
    else if (dir === 'up'){ cx = 3; cy = 11; }
    else if (dir === 'right'){ cx = 9; cy = 16; }
    else { cx = -2; cy = 16; }

    const carryCol =
      state.carry === 'raw' ? C.org :
      state.carry === 'exposed' ? C.badge :
      C.grnHi;
    const carryHi =
      state.carry === 'raw' ? C.orgHi :
      state.carry === 'exposed' ? '#fce078' :
      C.grnXHi;
    const carrySh =
      state.carry === 'raw' ? C.orgSh :
      state.carry === 'exposed' ? C.yelSh :
      C.grn;
    R(cx,cy,8,6,carryCol);
    R(cx,cy,8,1,carryHi);
    R(cx,cy+5,8,1,carrySh);
    R(cx+1,cy+2,6,1,C.black);
    R(cx+1,cy+4,6,1,C.black);
    // shine
    P(cx+1, cy+1, C.parchment);
  }

  // LEGS — animate by stride
  let legShift = 0;
  if (state.pmove){
    legShift = (stride === 1) ? -1 : (stride === 3 ? 1 : 0);
  }
  R(3 + legShift, 21, 3, 4, C.suit);
  R(8 - legShift, 21, 3, 4, C.suit);
  R(3 + legShift, 25, 3, 1, C.boot);
  R(8 - legShift, 25, 3, 1, C.boot);
  R(2,26,10,1,C.outline);  // floor shadow line as outline

  ctx.restore();
}

// Speech bubble (NPC or self)
function drawSpeech(){
  if (!state.speech) return;
  const s = state.speech;
  const px = s.who === 'npc' ? 319 : (state.px|0);
  const py = s.who === 'npc' ? 180 : (state.py - 32);
  const text = s.text;
  const w = Math.max(44, text.length * 6 + 12);
  const x = px - w/2;
  const y = py - 18;
  R(x, y, w, 16, C.parchment);
  R(x, y, w, 1, C.parchHi);
  R(x, y+15, w, 1, C.parchMid);
  R(x, y, 1, 16, C.parchHi);
  R(x+w-1, y, 1, 16, C.parchMid);
  txt(text, px, y+11, 7, '#3a2818', 'center');
  // tail
  R(px-1, y+16, 2, 2, C.parchment);
  P(px-1, y+18, C.parchMid);
  P(px, y+18, C.parchMid);

  // confetti for shipping moments
  if (text.includes('Si')){
    for (let i=0;i<3;i++){
      const phase = (state.t * 0.08 + i*0.33) % 1;
      if (phase < 0.1 || phase > 0.9) continue;
      const fx = px - 8 + i*8;
      const fy = y + 16 + phase * 10;
      const c = [C.badge, C.red, C.grnHi][i];
      P(fx, fy|0, c);
    }
  }
}

function drawInvIcon(sx, sy, slot){
  if (!slot.item) return;
  const cx = sx + 18, cy = sy + 10;
  switch (slot.item){
    case 'raw': {
      // raw wafer (gray)
      R(cx-7,cy-4,14,1,C.si);
      R(cx-8,cy-3,16,1,C.siMid);
      R(cx-9,cy-2,18,6,C.siHi);
      R(cx-8,cy+4,16,1,C.siMid);
      R(cx-7,cy+5,14,1,C.si);
      R(cx-6,cy-1,3,2,C.siXHi);
      P(cx-2,cy-2,C.siMid);
      break;
    }
    case 'exposed': {
      // yellow tint wafer
      R(cx-7,cy-4,14,1,C.yelSh);
      R(cx-8,cy-3,16,1,C.yel);
      R(cx-9,cy-2,18,6,C.yelHi);
      R(cx-8,cy+4,16,1,C.yel);
      R(cx-7,cy+5,14,1,C.yelSh);
      R(cx-6,cy-1,3,2,'#fff2c8');
      break;
    }
    case 'etched': {
      // green tint wafer
      R(cx-7,cy-4,14,1,C.grn);
      R(cx-8,cy-3,16,1,C.grnHi);
      R(cx-9,cy-2,18,6,C.grnXHi);
      R(cx-8,cy+4,16,1,C.grnHi);
      R(cx-7,cy+5,14,1,C.grn);
      P(cx-6,cy-1,C.parchment);
      break;
    }
    case 'photoresist': {
      R(cx-2,cy-6,4,2,C.bootHi);

      R(cx-1,cy-3,2,9,'#787890');

    case 'coffee': {

function drawMiniGame(){
  if (!state.miniGame) return;
  const m = state.miniGame;

  // dim play area (not HUD)
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(0, 22, W, H-22-32);

  const bw = 160, bh = 16;
  const bx = (W - bw) / 2;
  const by = 110;

  // frame
  R(bx-5, by-22, bw+10, bh+34, C.wood);
  R(bx-4, by-21, bw+8, 1, C.woodHi);
  R(bx-4, by+bh+12, bw+8, 1, C.woodDk);
  R(bx-4, by-21, 1, bh+33, C.woodHi);
  R(bx+bw+3, by-21, 1, bh+33, C.woodDk);
  R(bx-2, by-19, bw+4, 14, C.woodMid);

  // title
  const title = m.type === 'litho' ? 'LITHO 캘리브레이션' : 'ETCH 캘리브레이션';
  txt(title, W/2, by-9, 7, C.parchment, 'center');

  // bar background
  R(bx, by, bw, bh, C.boot);
  R(bx, by, bw, 1, C.bootHi);
  // zones (bad red full, then good yellow band, then perfect green band)
  R(bx+1, by+1, bw-2, bh-2, C.red);
  const goodX = Math.round(bw * 0.28), goodW = Math.round(bw * 0.44);
  R(bx + goodX, by+1, goodW, bh-2, C.badge);
  const perfX = Math.round(bw * 0.45), perfW = Math.round(bw * 0.10);
  R(bx + perfX, by+1, perfW, bh-2, C.grnHi);
  // tick marks at zone boundaries
  R(bx + goodX, by, 1, bh, C.parchment);
  R(bx + goodX + goodW, by, 1, bh, C.parchment);

  // marker
  const mx = bx + m.pos * bw;
  R(mx-1, by-3, 3, bh+6, C.parchment);
  R(mx, by-3, 1, bh+6, C.black);

  // hint / result
  if (m.result){
    const cmap = { perfect: C.grnHi, good: C.badge, bad: C.red };
    const tmap = { perfect: '⭐ PERFECT! +1 등급', good: 'GOOD ✓', bad: '✗ SCRAP!' };
    txt(tmap[m.result], W/2, by+bh+10, 8, cmap[m.result], 'center');
  } else {
    txt('Space 로 정지 — 중앙(녹색)이 PERFECT', W/2, by+bh+10, 6, C.parchHi, 'center');
  }
}

function drawCombo(){
  if (state.combo < 2) return;
  // skip if rush is occupying the same spot
  if (state.rush) return;
  const text = 'x' + state.combo + ' COMBO';
  const w = text.length * 8 + 18;
  const x = (W - w) / 2;
  const y = 26;

  // pulse subtle
  const pulse = 1 + 0.08 * Math.sin(state.t * 0.35);
  ctx.save();
  ctx.translate(W/2, y+8);
  ctx.scale(pulse, pulse);
  ctx.translate(-W/2, -(y+8));

  R(x, y, w, 16, C.red);
  R(x+1, y+1, w-2, 14, '#7a2818');
  R(x+1, y+1, w-2, 1, C.redHi);
  txt(text, W/2, y+11, 8, C.badge, 'center');

  // timer bar
  const ratio = state.comboTimer / (60*15);
  const tw = Math.max(0, ratio * (w-4)) | 0;
  R(x+2, y+13, w-4, 2, C.woodDk);
  R(x+2, y+13, tw, 2, C.grnHi);

  ctx.restore();
}

function drawQuest(){
  if (!state.quest) return;
  const q = state.quest;
  const x = 4, y = 24, w = 138, h = 22;
  R(x, y, w, h, C.wood);
  R(x, y, w, 1, C.woodHi);
  R(x, y+h-1, w, 1, C.woodDk);
  R(x, y, 1, h, C.woodHi);
  R(x+w-1, y, 1, h, C.woodDk);
  R(x+1, y+1, w-2, 1, C.woodMidHi);

  // scroll icon
  R(x+3, y+4, 8, 14, C.parchment);
  R(x+3, y+4, 8, 1, C.parchHi);
  R(x+3, y+17, 8, 1, C.parchMid);
  R(x+4, y+7, 6, 1, C.wood);
  R(x+4, y+10, 6, 1, C.wood);
  R(x+4, y+13, 4, 1, C.wood);

  // text
  txt('QUEST', x+14, y+9, 6, C.badge);
  txt(q.label, x+14, y+17, 5, C.parchment);
  // progress (right)
  const pt = q.progress + '/' + q.target;
  txt(pt, x+w-5, y+9, 7, C.grnHi, 'end');
  // bar
  R(x+w-44, y+12, 38, 5, C.boot);
  const pf = Math.min(1, q.progress / q.target);
  R(x+w-43, y+13, (36*pf)|0, 3, C.grnHi);
  // reward badge
  txt('+' + q.reward, x+w-5, y+19, 5, C.badge, 'end');
}

function drawRush(){
  if (!state.rush) return;
  const r = state.rush;
  const secs = Math.ceil(r.remaining / 60);
  const text = '🚨 RUSH ORDER  ' + r.shipped + '/' + r.target + '  ' + secs + 's  ×2 보상';
  const w = 220;
  const x = (W - w) / 2;
  const y = 24;

  const flash = (state.t >> 3) & 1;
  R(x, y, w, 20, flash ? C.red : '#7a2818');
  R(x, y, w, 1, C.redHi);
  R(x, y+19, w, 1, C.woodDk);
  R(x, y, 1, 20, C.redHi);
  R(x+w-1, y, 1, 20, C.woodDk);
  txt(text, W/2, y+10, 7, C.parchment, 'center');

  // timer
  const ratio = r.remaining / (60*30);
  R(x+2, y+15, w-4, 3, C.boot);
  R(x+2, y+15, ((w-4)*ratio)|0, 3, C.badge);
}

function drawAchv(){
  if (state.achvQ.length === 0) return;
  const a = state.achvQ[0];
  const text = a.text;
  const ttotal = 200;
  const elapsed = state.t - a.born;
  // slide in 0-20, hold, slide out 180-200
  let yOff = 0;
  if (elapsed < 18) yOff = -26 + (elapsed/18)*26;
  else if (elapsed > ttotal - 22) yOff = -((elapsed - (ttotal-22))/22) * 26;

  const w = text.length * 7 + 24;
  const x = (W - w) / 2;
  const y = 54 + yOff;

  // outer gold
  R(x-2, y-2, w+4, 22, C.badge);
  R(x-1, y-1, w+2, 1, '#fff2c8');
  R(x-1, y+18, w+2, 1, C.yelSh);
  // inner wood
  R(x, y, w, 18, C.wood);
  R(x, y, w, 1, C.woodHi);
  R(x, y+17, w, 1, C.woodDk);
  // sparkles
  if ((state.t >> 3) & 1){
    P(x+2, y+2, C.parchment);
    P(x+w-3, y+15, C.parchment);
  } else {
    P(x+5, y+15, C.parchment);
    P(x+w-6, y+2, C.parchment);
  }
  // text
  txt(text, W/2, y+12, 7, C.badge, 'center');
}

function drawShop(){
  if (!state.shopOpen) return;

  // backdrop
  ctx.fillStyle = 'rgba(20,16,26,0.75)';
  ctx.fillRect(0, 0, W, H);

  // modal frame
  const mx = 56, my = 16, mw = 368, mh = 238;
  R(mx-3, my-3, mw+6, mh+6, C.badge);
  R(mx, my, mw, mh, C.wood);
  R(mx, my, mw, 2, C.woodHi);
  R(mx, my+mh-2, mw, 2, C.woodDk);
  R(mx, my, 2, mh, C.woodHi);
  R(mx+mw-2, my, 2, mh, C.woodDk);
  // inner panel
  R(mx+4, my+4, mw-8, mh-8, C.woodMid);
  R(mx+4, my+4, mw-8, 1, C.woodMidHi);

  // title bar
  R(mx+8, my+8, mw-16, 22, '#3a2818');
  R(mx+8, my+8, mw-16, 1, C.woodHi);
  R(mx+8, my+28, mw-16, 1, C.woodDk);
  // gold corner pins
  for (const cx of [mx+12, mx+mw-18]){
    R(cx, my+12, 4, 4, C.badge);
    P(cx+1, my+13, '#fff2c8');
  }
  txt('🛒  FAB-MART', mx + mw/2, my+22, 8, C.parchment, 'center');

  // Si counter (top-right of modal)
  const siText = 'Si ' + state.silicon;
  const siw = siText.length * 6 + 16;
  R(mx+mw-siw-12, my+36, siw, 14, C.woodDk);
  R(mx+mw-siw-12, my+36, siw, 1, C.bootHi);
  // silicon icon
  R(mx+mw-siw-6, my+39, 4, 1, C.si);
  R(mx+mw-siw-7, my+40, 6, 1, C.siMid);
  R(mx+mw-siw-8, my+41, 8, 3, C.siHi);
  R(mx+mw-siw-7, my+44, 6, 2, C.siMid);
  txt(state.silicon, mx+mw-16, my+47, 7, C.badge, 'end');

  // section labels + items
  const rowY0 = my + 54;
  const rowH = 16;

  // separator before upgrades (between idx 4 and 5)
  for (let i=0; i<SHOP_ITEMS.length; i++){
    const item = SHOP_ITEMS[i];
    const ry = rowY0 + i*rowH;
    const sel = i === state.shopCursor;

    // section header before first upgrade
    if (i === 5){
      // (no-op visual since we draw a divider after row 4)
    }

    // row background
    if (sel){
      R(mx+10, ry-1, mw-20, rowH-1, '#4a2c18');
      R(mx+10, ry-1, mw-20, 1, C.woodHi);
      R(mx+10, ry+rowH-3, mw-20, 1, C.woodDk);
      // cursor chevron
      txt('▶', mx+16, ry+11, 8, C.badge);
      // purchase flash
      if (state.shopFlash > 0){
        ctx.fillStyle = state.shopFlash > 16 ? 'rgba(168,240,192,0.55)' : 'rgba(168,240,192,0.2)';
        ctx.fillRect(mx+10, ry-1, mw-20, rowH-1);
        state.shopFlash--;
      }
    }

    // icon (reuse drawInvIcon by faking the slot position)
    // drawInvIcon draws icon centered at sx+18, sy+10
    const icx = mx + 32;
    drawInvIcon(icx - 18, ry - 4, { item: item.icon, count: 0 });

    // name
    let label = item.name;
    if (item.kind === 'upgrade'){
      const lv = state.upgrades[item.id];
      label += ' Lv.' + lv + '/' + item.max;
    }
    txt(label, mx + 56, ry + 11, 7, C.parchment);

    // count (for consumables) — show what you have
    if (item.kind === 'consume'){
      const have = (item.id === 'pr') ? state.inventory.photoresist :
                   (item.id === 'et') ? state.inventory.etchant :
                   (item.id === 'coffee') ? state.inventory.coffee :
                   (item.id === 'wrench') ? state.inventory.wrench :
                   state.inventory.mask;
      txt('보유 ' + have, mx + mw - 100, ry + 11, 6, C.parchMid, 'end');
    }

    // price / state
    let priceText, priceCol;
    if (item.kind === 'consume'){
      priceText = item.price + ' Si';
      priceCol = state.silicon >= item.price ? C.grnHi : C.red;
    } else {
      const lv = state.upgrades[item.id];
      if (lv >= item.max){
        priceText = 'MAX';
        priceCol = C.parchMid;
      } else {
        const p = item.prices[lv];
        priceText = p + ' Si';
        priceCol = state.silicon >= p ? C.grnHi : C.red;
      }
    }
    txt(priceText, mx + mw - 18, ry + 11, 7, priceCol, 'end');
  }

  // divider between consumables (0-4) and upgrades (5-8)
  const divY = rowY0 + 5*rowH - 2;
  R(mx + 12, divY, mw - 24, 1, C.woodDk);
  R(mx + 12, divY+1, mw - 24, 1, C.woodHi);

  // footer
  const footY = my + mh - 22;
  R(mx + 8, footY, mw - 16, 14, C.woodDk);
  R(mx + 8, footY, mw - 16, 1, '#2a1810');
  txt('↑↓ 선택   Enter 구매   B / Esc 닫기', mx + mw/2, footY + 10, 6, C.parchMid, 'center');
}

// ============================================================
//  MAIN LOOP
// ============================================================

function frame(){
  update();
  clear();
  drawWall();
  drawFloor();

  // Depth-sorted floor entities (machines + characters), sorted by base/foot Y.
  // Smaller sortY = further from camera = drawn first (gets covered by later entities).
  // Player gets +0.5 nudge so ties favor showing the player in front.
  const ents = [
    { sortY: 210, draw: drawFoupShelf },
    { sortY: 230, draw: drawKiosk },
    { sortY: 202, draw: drawLitho },
    { sortY: 194, draw: drawEtcher },
    { sortY: 224, draw: drawCrate },
    { sortY: 213, draw: drawNpc },
    { sortY: state.py + 0.5, draw: drawPlayer },
  ];
  ents.sort((a, b) => a.sortY - b.sortY);
  for (const e of ents) e.draw();

  // Overhead conveyor is drawn AFTER entities so its cart and rail
  // pass in front of the player when they walk near the back wall.
  drawConveyor();

  // UI layer (always on top)
  drawSpeech();
  drawHud();
  drawQuest();
  drawRush();
  drawCombo();
  drawPrompt();
  drawMsg();
  drawMiniGame();
  drawShop();    // shop modal overlays everything else
  drawAchv();

  // vignette
  ctx.fillStyle = 'rgba(0,0,0,0.1)';
  ctx.fillRect(0,0,W,4);
  ctx.fillRect(0,H-4,W,4);

  requestAnimationFrame(frame);
}
